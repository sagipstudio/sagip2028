<title>SAGIP PILIPINAS 2028 — Boss Edition</title>
<style>

  #ocean{ position:fixed; left:0; right:0; bottom:0; height:14%; z-index:1;

     border-top:3px solid rgba(224,196,120,.65);}

     background-size:24px 12px; animation:wob 3s linear infinite;}
  @keyframes wob{ from{background-position-x:0;} to{background-position-x:24px;} }
  #rain{ position:fixed; inset:0; z-index:3; pointer-events:none; opacity:0; transition:opacity 1.5s;
     background:repeating-linear-gradient(75deg, transparent 0 9px, rgba(190,210,230,.07) 9px 10px);
     animation:rf .45s linear infinite;}

  header h1{ font-size:1.3rem; letter-spacing:.13em; color:var(--sun);}
  header .sub{ font-size:.76rem; color:var(--muted); letter-spacing:.2em; text-transform:uppercase;}
  #langbtn{ position:absolute; right:0; top:2px; background:transparent; color:var(--muted);
     border:1px solid rgba(255,255,255,.25); border-radius:5px; padding:5px 11px; font-size:.82rem; cursor:pointer;}
  #islands{ text-align:center; font-size:1.55rem; letter-spacing:.2em; padding:8px 0 3px; }

  #islands span.won{ filter:none; opacity:1;}

  #stage{ flex:1; display:flex; align-items:center; padding:6px 0 110px;}
  .card{ background:var(--paper); color:var(--ink); border-radius:10px; padding:18px 16px;

  @keyframes pop{ from{transform:translateY(12px);opacity:0;} to{transform:none;opacity:1;} }

  .bossplate .rl{ font-size:.8rem; color:#5c718a; text-transform:uppercase; letter-spacing:.14em;}

  .tag{ font-size:.72rem; letter-spacing:.2em; text-transform:uppercase; color:#5c718a; margin-bottom:6px;}
  .card p{ font-size:1.08rem; line-height:1.55; margin-bottom:9px;}
  .say{ background:#e7e0cd; border-left:3px solid #7a1f1f; padding:10px 12px; font-style:italic;
     font-size:1.02rem; margin:9px 0; border-radius:0 6px 6px 0;}
  .say.win{ border-left-color:var(--good);}
  .choices{ margin-top:10px; display:flex; flex-direction:column; gap:8px;}
  .choices button{ background:var(--ink); color:var(--paper); border:none; border-radius:8px;

  .screen p{ line-height:1.6; font-size:1.05rem; margin-bottom:9px;}
  .fine{ color:var(--muted); font-size:.87rem; line-height:1.55;}
  .btn{ margin:12px auto 0; background:var(--sun); color:#231a05; border:none; border-radius:8px;
     padding:14px 30px; font-family:inherit; font-size:1.05rem; font-weight:700; cursor:pointer;}
  .btn.alt{ background:transparent; color:var(--sun); border:1px solid var(--sun);}
  table.sc{ width:100%; border-collapse:collapse; background:var(--paper); color:var(--ink); border-radius:8px; overflow:hidden; font-size:.86rem;}
  table.sc th, table.sc td{ padding:7px 9px; border-bottom:1px solid #d8ccb2; text-align:left;}
  table.sc th{ background:#e7e0cd; font-size:.76rem; letter-spacing:.08em; text-transform:uppercase;}
  table.sc td.a{ color:#a83232; font-weight:700; text-align:center;}
  table.sc td.b{ color:#1c7a4e; font-weight:700; text-align:center;}

     padding:18px 14px; margin:12px auto 0; max-width:400px; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.5);}

  .cert .row{ font-size:.9rem; margin:5px 0;}

</style>

const app=document.getElementById("app"), ocean=document.getElementById("ocean"),
      sky=document.getElementById("skyline");
function draw(){
  const w=Math.max(6,Math.min(100,G.flood));
  const h=Math.round(6+w*0.62), sink=Math.round(4+w*0.5);
  ocean.style.height=h+"%"; sky.style.bottom=`calc(${h}% - ${sink}px)`;
  document.body.classList.toggle("storm", w>=55);
}

function hud(){
  const dots=B.map((x,i)=>{
    let cls="";
    if(i<G.b){ cls=(G.roundWins[i]||0)>=2 ? "won" : "lost"; }
    else if(i===G.b && G.b<B.length){ cls="cur"; }
    return `<span class="${cls}">${x.face}</span>`;
  }).join("")+`<span class="${G.b>=B.length?(G.done?((G.pk>=4&&G.vote!=="X")?"won":"lost"):"cur"):""}">${PAGSUKO.face}</span>`;
  return `<header><h1>SAGIP PILIPINAS 2028</h1><div class="sub">Boss Edition · The Rogues' Gallery</div>
  <button id="langbtn">${LANG==="tl"?"EN":"TL"}</button></header>
  <div id="islands">${dots}</div>
  <div id="hud"><span>${T(UI.boss)} <b>${Math.min(G.b+1,11)}/11</b></span>
  <span>${T(UI.flood)}: <b>${G.flood}%</b></span></div>`;
}
function bindLang(f){ const b=document.getElementById("langbtn"); if(b)b.onclick=()=>{LANG=LANG==="tl"?"en":"tl";f();}; }

function bossIntro(){
  const b=B[G.b];
  G.hp=b.rounds.length;
  app.innerHTML=hud()+`<div id="stage"><div class="card">
   <div class="bossplate"><div class="face">${b.face}</div>
    <div><div class="nm">${T(b.nm)}</div><div class="rl">${T(b.rl)}</div></div>
    <div class="hp">${"●".repeat(G.hp)}${"○".repeat(B[G.b].rounds.length-G.hp)}</div></div>
   <div class="say">${T(b.intro)}</div>
   <div class="choices"><button id="go">⚔️ ${T(UI.fight)}</button></div></div></div>`;
  bindLang(bossIntro);
  document.getElementById("go").onclick=()=>{G.r=0;round();};
}

function round(){
  const b=B[G.b], r=b.rounds[G.r];
  const grim=r.grim?" grim":"";
  const opts=r.ch.map((c,i)=>`<button data-i="${i}">${T(c[0])}</button>`).join("");
  app.innerHTML=hud()+`<div id="stage"><div class="card${grim}">
   <div class="bossplate"><div class="face">${b.face}</div>
    <div><div class="nm">${T(b.nm)}</div><div class="rl">${T(UI.round)} ${G.r+1}/${b.rounds.length}</div></div>
    <div class="hp">${"●".repeat(G.hp)}${"○".repeat(B[G.b].rounds.length-G.hp)}</div></div>
   <p>${T(r.q)}</p><div class="choices">${opts}</div></div></div>`;
  bindLang(round);
  document.querySelectorAll(".choices button").forEach(bt=>{
    bt.onclick=()=>{
      const ok=r.ch[+bt.dataset.i][1]===1;
      if(ok){ G.hp--; G.wins++; G.roundWins[G.b]=(G.roundWins[G.b]||0)+1; G.flood=Math.max(6,G.flood-2); }
      else{ G.flood=Math.min(100,G.flood+7); }
      draw();
      reaction(ok);
    };
  });
}

function reaction(ok){
  const b=B[G.b];
  const line=ok?b.hurt:b.taunt;
  const cls=ok?"say win":"say";
  app.innerHTML=hud()+`<div id="stage"><div class="card">
   <div class="bossplate"><div class="face">${b.face}</div>
    <div><div class="nm">${T(b.nm)}</div><div class="rl">${ok?"💥":"🩸"}</div></div>
    <div class="hp">${"●".repeat(G.hp)}${"○".repeat(B[G.b].rounds.length-G.hp)}</div></div>
   <div class="${cls}">${T(line)}</div>
   <div class="choices"><button id="go">➤</button></div></div></div>`;
  bindLang(()=>reaction(ok));
  document.getElementById("go").onclick=()=>{
    G.r++;
    if(G.r>=B[G.b].rounds.length||G.hp<=0){ bossEnd(); } else { round(); }
  };
}

function bossEnd(){
  const b=B[G.b], w=G.roundWins[G.b]||0, won=w>=2;
  if(!won) G.flood=Math.min(100,G.flood+6);
  draw();
  G.seen.push(G.b);
  app.innerHTML=hud()+`<div id="stage"><div class="card">
   <div class="bossplate"><div class="face">${won?"✅":"🌊"} ${b.face}</div>
    <div><div class="nm">${T(b.nm)}</div><div class="rl">${won?T(UI.saved):T(UI.lost)} · ${w}/${b.rounds.length}</div></div></div>
   ${won?`<p>${T(b.defeat)}</p>`:""}
   <div class="say win"><b>${T(UI.resibo)}:</b> ${T(b.resibo)}</div>
   <div class="choices"><button id="go">➤ ${T(UI.next)}</button></div></div></div>`;
  bindLang(bossEnd);
  document.getElementById("go").onclick=()=>{
    G.b++;
    if(G.b>=B.length){ stylePick(); } else { bossIntro(); }
  };
}

function stylePick(){
  const opts=STYLES.map((s,i)=>`<button data-i="${i}">${T(s.n)}</button>`).join("");
  app.innerHTML=hud()+`<div class="screen"><h2>${LANG==="tl"?"ANG PAGPILI NG URI":"CHOOSE YOUR TYPE"}</h2>
   <p>${T(UI.stylq)}</p><div class="choices" style="text-align:left;">${opts}</div></div>`;
  bindLang(stylePick);
  document.querySelectorAll(".choices button").forEach(bt=>{
    bt.onclick=()=>{ G.style=STYLES[+bt.dataset.i]; ingay(); };
  });
}

function ingay(){
  const rows=SCORE_ROWS.map(r=>`<tr><td>${T(r.c)}</td><td class="a">${r.a}</td><td class="b">${r.b}</td></tr>`).join("");
  const ta=SCORE_ROWS.reduce((s,r)=>s+r.a,0), tb=SCORE_ROWS.reduce((s,r)=>s+r.b,0);
  const rate=n=>n>=17?"AAA":n>=13?"BBB":n>=9?"BB":n>=5?"CCC":"JUNK";
  app.innerHTML=hud()+`<div class="screen"><h2>🤫 ${T(UI.ingayT)}</h2>
   <p class="fine">${LANG==="tl"?"Ito ang lahat ng NASAKSIHAN mo, walang ingay, walang mukha:":"Everything you WITNESSED, no noise, no faces:"}</p>
   <table class="sc"><tr><th></th><th>A ${T(CAND.A.tag)}</th><th>B ${T(CAND.B.tag)}</th></tr>${rows}
   <tr><th>${LANG==="tl"?"KABUUAN / RATING":"TOTAL / RATING"}</th><td class="a">${ta} · ${rate(ta)}</td><td class="b">${tb} · ${rate(tb)}</td></tr></table>
   <p style="margin-top:12px;">${T(UI.ingayQ)}</p>
   <div class="choices">${candBtn("A","pa")}${candBtn("B","pb")}</div></div>`;
  bindLang(ingay);
  document.getElementById("pa").onclick=()=>{G.ingay="A";pagsukoIntro();};
  document.getElementById("pb").onclick=()=>{G.ingay="B";pagsukoIntro();};
}

function pagsukoIntro(){
  app.innerHTML=hud()+`<div id="stage"><div class="card grim">
   <div class="bossplate"><div class="face">${PAGSUKO.face}</div>
    <div><div class="nm">${T(PAGSUKO.nm)}</div><div class="rl">FINAL BOSS</div></div></div>
   <p>${T(PAGSUKO.intro)}</p>
   <div class="choices"><button id="go">⚔️ ${T(UI.fight)}</button></div></div></div>`;
  bindLang(pagsukoIntro);
  document.getElementById("go").onclick=()=>{G.r=0;pagsukoRound();};
}

function pagsukoRound(){
  if(G.r>=PAGSUKO.checklist.length){ ballot(); return; }
  const c=PAGSUKO.checklist[G.r], wh=PAGSUKO.whisper[G.r];
  app.innerHTML=hud()+`<div id="stage"><div class="card grim">
   <div class="bossplate"><div class="face">${PAGSUKO.face}</div>
    <div><div class="nm">${T(PAGSUKO.nm)}</div><div class="rl">${G.r+1}/7</div></div></div>
   <div class="say">${T(wh)}</div>
   <p><b>${T(c.q)}</b></p>
   <div class="choices">${candBtn("A","pa")}${candBtn("B","pb")}</div></div></div>`;
  bindLang(pagsukoRound);
  const ans=w=>{ if(w==="B"){G.pk++; G.flood=Math.max(6,G.flood-2);} else {G.flood=Math.min(100,G.flood+5);} draw(); G.r++; pagsukoRound(); };
  document.getElementById("pa").onclick=()=>ans("A");
  document.getElementById("pb").onclick=()=>ans("B");
}

function ballot(){
  app.innerHTML=hud()+`<div class="screen"><h2>🗳️ ${T(UI.voteT)}</h2><p>${T(UI.voteQ)}</p>
   <div class="choices">${candBtn("A","pa")}${candBtn("B","pb")}
   <button id="px">${LANG==="tl"?"Iwanang blanko":"Leave it blank"}</button></div></div>`;
  bindLang(ballot);
  const v=x=>{G.vote=x; cert();};
  document.getElementById("pa").onclick=()=>v("A");
  document.getElementById("pb").onclick=()=>v("B");
  document.getElementById("px").onclick=()=>v("X");
}

function cert(){
  if(!G.done){
    if(G.vote==="B") G.flood=Math.max(6,G.flood-18);
    if(G.vote==="A") G.flood=Math.min(100,G.flood+18);
    if(G.vote==="X") G.flood=Math.min(100,G.flood+10);
    G.done=true;
  }
  draw();
  const islands=Object.values(G.roundWins).filter(w=>w>=2).length;
  const total=G.wins+G.pk; // of 37
  const pct=Math.round(100*total/37);
  let title,seal;
  if(islands>=10&&G.pk>=6&&G.vote==="B"){ title={tl:"HUWARANG BOTANTE",en:"EXEMPLARY VOTER"}; seal="🏅"; }
  else if(islands>=8){ title={tl:"MATALINONG BOTANTE",en:"WISE VOTER"}; seal="⭐"; }
  else if(islands>=6){ title={tl:"GISING NA BOTANTE",en:"AWAKENED VOTER"}; seal="☀️"; }
  else { title={tl:"KATIBAYAN NG PAGKA-BUDOL",en:"CERTIFICATE OF HAVING BEEN BUDOL-ED"}; seal="🎣"; }
  const budol=islands<6;
  const gap=(G.ingay==="B"&&G.vote!=="B")||(G.ingay==="A"&&G.vote!=="A");
  const sank=G.flood>=50;
  app.innerHTML=hud()+`<div class="screen">
   <h2>${sank?"🌊 LUMUBOG":"🏊 LUMANGOY"}</h2>
   <div class="cert">
    <div class="khead">${T(UI.certH)}</div>
    <div class="seal">${seal}</div>
    <div class="title">${T(title)}</div>
    ${budol?`<div class="row" style="font-style:italic;">${LANG==="tl"?"“Bobotante?” Hindi. Walang bobong botante — may bihasang manloloko. May resibo sila; ngayon, may resibo ka na rin.":"“Bobotante?” No. There are no stupid voters — only skilled deceivers. They kept receipts; now you have receipts too."}</div>`:""}
    <div class="row">🏝️ ${LANG==="tl"?"Mga islang nailigtas":"Islands saved"}: <b>${islands}/10</b> · ${LANG==="tl"?"Gising Score":"Awake Score"}: <b>${pct}%</b></div>
    <div class="row">${LANG==="tl"?"Uri ng pamamahalang pinili":"Governance type chosen"}: <b>${G.style?T(G.style.n).split("—")[0]:"—"}</b></div>
    <div class="row">${LANG==="tl"?"Sa katahimikan, pinili mo si":"In silence, you chose"} <b>${nameOf(G.ingay)}</b> · ${LANG==="tl"?"Sa balota, si":"On the ballot,"} <b>${nameOf(G.vote)}</b>${gap?` — <i>${LANG==="tl"?"iba ang sagot mo sa ingay kaysa sa katahimikan. Alam mo na kung bakit.":"your answer under noise differed from your answer in silence. You know why."}</i>`:""}</div>
    <div class="row" style="font-size:.7rem;">${T(CAND.A.tag)}: <b style="color:#a83232;">RATING JUNK</b> — ${LANG==="tl"?"'wag ipahiram ang bansa":"do not lend this person a country"} · ${T(CAND.B.tag)}: <b style="color:#1c7a4e;">RATING AAA</b> — ${LANG==="tl"?"bantayan pa rin":"keep them honest anyway"}</div>
    <div class="chain">${T(UI.chains)}</div>
    <div class="row" style="font-size:.68rem; margin-top:6px;">✅ ${T(UI.verify)}</div>
   </div>
   <p class="fine" style="margin-top:10px;">${T(UI.noname)}</p>
   <button class="btn" onclick="location.reload()">${T(UI.again)}</button>
  </div>`;
  bindLang(cert);
}

function title(){
  ocean.style.height="12%"; sky.style.bottom="calc(12% - 8px)";
  app.innerHTML=`<div class="screen">
   <h2 style="font-size:1.8rem;">SAGIP PILIPINAS 2028</h2>
   <p class="fine" style="letter-spacing:.26em;text-transform:uppercase;">Boss Edition · The Rogues' Gallery</p>
   <p style="margin-top:14px;">${LANG==="tl"?"Sampung boss ang nakaharang bago ka makaboto nang matino — ang Sobre, ang Buwaya, ang Artista, ang Kulto, ang Troll, ang Dinastiya, ang Sindikato, ang Above-the-Law, ang May Sayad, at ang Amo. At sa pinakadulo, ang pinakamalakas sa lahat: ANG PAGSUKO.":"Ten bosses stand between you and a clear-eyed ballot — the Envelope, the Crocodile, the Action Star, the Cult, the Troll, the Dynasty, the Syndicate, the Above-the-Law, the Unhinged, and the Patron. And at the end, the strongest of them all: THE SURRENDER."}</p>
   <p class="fine">${LANG==="tl"?"Bawat tamang sagot, umaahon ang bayan. Bawat maling sagot, tumataas ang baha. Walang totoong pangalan dito — ang mga taktika lang ang totoo.":"Every right answer lifts the town out of the water. Every wrong one raises the flood. No real names here — only the tactics are real."}</p>
   <button class="btn" onclick="startGame()">⚔️ ${LANG==="tl"?"HARAPIN SILA":"FACE THEM"}</button>
   <div><button class="btn alt" id="tl2">${LANG==="tl"?"Play in English":"Maglaro sa Tagalog"}</button></div>
   <p class="fine" style="margin-top:10px;">v1.0 · kapatid ng CHURCH, INC. · framework: 6-module Voter's Guide</p>
  </div>`;
  document.getElementById("tl2").onclick=()=>{LANG=LANG==="tl"?"en":"tl";title();};
}
window.startGame=function(){ G.b=0;G.hp=3;draw();bossIntro(); };
draw(); title();
</script>
</body>
</html>
