  .sharecard{ background:var(--paper); color:var(--ink); border-radius:10px; padding:16px; margin:14px auto 0; max-width:340px; box-shadow:0 8px 30px rgba(0,0,0,.5);}

const draw=(calm)=>{
  const w = calm!==undefined ? calm : Math.max(5,Math.min(100,G.water));
  const h = Math.round(6 + w*0.72);              /* flood height, % of screen */
  const sink = Math.round(4 + w*0.52);           /* how deep the barangay sits */
  ocean.style.height = h+"%";
  sky.style.bottom = `calc(${h}% - ${sink}px)`;  /* rooftops ride the waterline */
  document.body.classList.toggle("storm", (calm===undefined) && G.water>=60);
};

function floodLabel(){
  const w=G.water;
  if(w<=25) return {tl:"tuyo pa ang tsinelas",en:"slippers still dry"};
  if(w<=40) return {tl:"hanggang bukung-bukong",en:"ankle-deep"};
  if(w<=55) return {tl:"hanggang tuhod",en:"knee-deep"};
  if(w<=70) return {tl:"hanggang bewang",en:"waist-deep"};
  if(w<=82) return {tl:"hanggang dibdib",en:"chest-deep"};
  if(w<=90) return {tl:"hanggang leeg",en:"neck-deep"};
  return {tl:"lagpas-tao na",en:"over our heads"};
}

     [{tl:"Ngumiti, tumango — pero walang deacon sa loob ng booth.",en:"Smile, nod — but there is no deacon inside the booth."},{w:-3,p:2,rec:"bloc"}]]},

{dim:"conscience", tag:{tl:"ANG SERMON",en:"THE SERMON"},
 body:{tl:"Linggo. Mula sa pulpito: 'Nasusulat — sumunod kayo sa mga namumuno sa inyo. Ang kandidatong ito ang pinili ng Diyos. Ang susuway sa balota ay sumusuway sa Diyos — at alam ninyo kung saan nauuwi ang suwail.' Tahimik ang kapilya. Katabi mo ang buong pamilya mo. May listahan ang usher.",
       en:"Sunday. From the pulpit: 'It is written — obey those who rule over you. This candidate is God's chosen. To defy the ballot is to defy God — and you know where the disobedient end up.' The chapel is silent. Your whole family sits beside you. The usher has a list."},
 quote:{tl:"Ang buong talata, kapag ikaw mismo ang bumasa: tungkol sa pananampalataya. Walang kandidato. Walang balota. Walang apoy na nakalaan sa botante.",
        en:"The full passage, when you read it yourself: it is about faith. No candidate. No ballot. No fire reserved for voters."},
 ch:[[{tl:"Susunod ako. Ayokong masunog sa impiyerno.",en:"I will obey. I don't want to burn in hell."},{w:9,p:0,rec:"hellvote"}],
     [{tl:"Sasama ako sa simbahan sa lahat ng bagay — pero sa loob ng booth, ako at ang Diyos lang ang nakakaalam.",en:"I'll stand with my church in everything — but inside the booth, only God and I will know."},{w:-2,p:1,rec:"hellvote"}],
     [{tl:"Babasahin ko ang buong kabanata pagkauwi. Kung takot ang kailangan para makuha ang boto mo — hindi Diyos ang humihingi nito.",en:"I'll read the whole chapter when I get home. If it takes fear to collect your vote — it isn't God doing the collecting."},{w:-4,p:2,rec:"hellvote"}]]},

{dim:"intel", tag:{tl:"ANG TIKTOK EDIT",en:"THE TIKTOK EDIT"},
 body:{tl:"Viral: gintong lungsod, disiplinadong lansangan, malungkot na piano. Caption: 'Ibalik ang Ginintuang Panahon.' Ang ganda ng edit. Ang alaala ng lolo mo tungkol sa panahong 'yon: hindi ganyan.",
       en:"Viral: a golden city, disciplined streets, sad piano. Caption: 'Bring back the Golden Age.' Beautiful edit. Your grandfather's memory of that era: not that."},
 ch:[[{tl:"I-share. Nakaka-proud naman.",en:"Share it. It does make you proud."},{w:8,p:0,rec:"meme"}],
     [{tl:"Tanungin muna si Lolo. Tapos ang mga resibo.",en:"Ask Grandfather first. Then check the receipts."},{w:-3,p:2,rec:"meme"}]]},

{dim:"aware", tag:{tl:"ANG TARPAULIN",en:"THE TARPAULIN"},
 body:{tl:"May bagong tulay sa bayan. Sa gitna ng tulay: tarpaulin na mas malaki pa sa tulay, mukha ng pulitiko, at ang salitang 'PROJECT NI...' Pera mo ang nagpagawa niyan.",
       en:"Your town has a new bridge. In the middle of it: a tarpaulin larger than the bridge, a politician's face, and the words 'A PROJECT OF...' Your taxes built that."},
 ch:[[{tl:"Mabait siya — may ginagawa siya para sa atin!",en:"He's good — look, he does things for us!"},{w:7,p:0,rec:"epal"}],
     [{tl:"Trabaho niya 'yan, hindi regalo niya. At pera natin 'yan.",en:"That's his job, not his gift. And that's our money."},{w:-3,p:2,rec:"epal"}]]},

{dim:"aware", tag:{tl:"BLIND TEST — UNANG ROUND: ANG DAGAT",en:"BLIND TEST — ROUND 1: THE SEA"},
 body:{tl:"Alisin natin ang mga pangalan. Dalawang kandidato, isang tanong: 'Ano ang gagawin mo sa karagatang atin ayon sa international ruling?'",
       en:"Let's remove the names. Two candidates, one question: 'What will you do about the waters that are ours by international ruling?'"},
 quote:{tl:"A: “Huwag nating galitin ang malaking kaibigan. Isantabi muna ang ruling.”  B: “Atin 'yon — panalo tayo sa korte ng mundo. Ipagtatanggol ko ito nang hindi tayo napapasok sa giyera.”",
        en:"A: “Let's not anger the big friend. Set the ruling aside for now.”  B: “It is ours — we won in the world's court. I will defend it without walking us into a war.”"},
 ch:[[{tl:"Si A ang tama.",en:"A is right."},{w:8,p:0,rec:"seat"}],
     [{tl:"Si B ang tama.",en:"B is right."},{w:-4,p:2,rec:"seat"}]]},

{dim:"aware", tag:{tl:"BLIND TEST — IKALAWANG ROUND: ANG REKORD",en:"BLIND TEST — ROUND 2: THE RECORD"},
 body:{tl:"Mga rekord, walang pangalan. A: kilalang apelyido; mainit sa TV; ₱125M na 'confidential funds' na naubos sa 11 araw; tahimik tuwing may binabangga sa dagat. B: may-akda ng mga batas sa maternity leave, mental health, at laban sa online child abuse; nag-imbestiga sa isang pastor na trafficker at sa mga scam hub.",
       en:"Records, no names. A: famous surname; warm on TV; ₱125M in 'confidential funds' spent in 11 days; silent whenever our boats are rammed. B: authored the maternity leave, mental health, and anti-online-child-abuse laws; investigated a trafficking pastor and the scam hubs."},
 ch:[[{tl:"Mas kapani-paniwala ang rekord ni A.",en:"A's record is more convincing."},{w:8,p:0,rec:"blind"}],
     [{tl:"Mas kapani-paniwala ang rekord ni B.",en:"B's record is more convincing."},{w:-4,p:2,rec:"blind"}]]},

{dim:"intel", tag:{tl:"BLIND TEST — HULING ROUND: ANG AKUSASYON",en:"BLIND TEST — FINAL ROUND: THE ACCUSATION"},
 body:{tl:"Paano sila sumagot sa akusasyon? A: hindi sumipot sa pagdinig; nagpa-rally ang simbahan; 'political persecution' daw lahat. B: dumating na may mga dokumento; kinasuhan ng mismong krimen ng inimbestigahan niya; naghain ng kaso — at naghintay sa korte.",
       en:"How did each answer accusations? A: skipped the hearings; the church rallied in the streets; called it all 'political persecution.' B: showed up with documents; was counter-charged with her own investigation's crime; filed a case — and waited for the court."},
 ch:[[{tl:"Kawawa si A — pinag-iinitan talaga.",en:"Poor A — clearly being persecuted."},{w:8,p:0,rec:"martyr"}],
     [{tl:"Ang taong may resibo ay hindi nagtatago sa rally.",en:"People with receipts don't hide behind rallies."},{w:-4,p:2,rec:"martyr"}]]},

{dim:"aware", tag:{tl:"ANG RED-TAG POST",en:"THE RED-TAG POST"},
 body:{tl:"May kumakalat: si Kandidato B daw ay 'kaanib ng mga rebelde.' Walang ebidensya, pero libo na ang share. Komento ng isa: 'Kaya pala mahilig sa human rights.'",
       en:"A post spreads: Candidate B is 'linked to the rebels.' No evidence, thousands of shares. One comment: 'No wonder she's so into human rights.'"},
 ch:[[{tl:"Walang usok kung walang apoy.",en:"No smoke without fire."},{w:7,p:0,rec:"redtag"}],
     [{tl:"Ang red-tag ay sandata, hindi ebidensya — ruling na 'yan ng Korte Suprema.",en:"A red tag is a weapon, not evidence — the Supreme Court itself ruled so."},{w:-3,p:2,rec:"redtag"}]]},

{dim:"intel", tag:{tl:"ANG CELEBRITY",en:"THE CELEBRITY"},
 body:{tl:"Ang paborito mong action star, sumigaw sa entablado: 'Si Kandidato A ang para sa mahirap!' Ang sigaw ng crowd, parang kampyonato. Hindi mo maalala kung ano na nga ba ang nagawa ni A para sa mahirap.",
       en:"Your favorite action star shouts from the stage: 'Candidate A is for the poor!' The crowd roars like it's a title fight. You can't actually recall what A has ever done for the poor."},
 ch:[[{tl:"Kung kay Idol siya, sa akin din.",en:"If my idol's for him, so am I."},{w:7,p:0,rec:"celeb"}],
     [{tl:"Ang sikat ay hindi kwalipikasyon. Hanapin ang rekord, hindi ang palakpak.",en:"Fame is not a qualification. Find the record, not the applause."},{w:-3,p:2,rec:"celeb"}]]},

{dim:"character", tag:{tl:"HAPUNAN SA BAHAY",en:"DINNER AT HOME"},
 body:{tl:"Sabi ng tatay mo — mahal ka niya: 'Anak, alam kong gusto mo si B. Pero talo na 'yan sabi ng survey. Sayang ang boto. Isipin mo ang pamilya.'",
       en:"Your father — who loves you — says: 'Anak, I know you like B. But the surveys say it's over. Don't waste your vote. Think of the family.'"},
 ch:[[{tl:"Tama si Tatay. Praktikal na lang.",en:"Father's right. Be practical."},{w:8,p:0,rec:"wasted"}],
     [{tl:"Mahal ko si Tatay — pero sekreto ang balota, kahit sa hapag-kainan.",en:"I love my father — but the ballot is secret, even at the dinner table."},{w:-3,p:2,rec:"wasted"}]]},

{dim:"conscience", tag:{tl:"ANG JOB OFFER",en:"THE JOB OFFER"},
 body:{tl:"Chat ng pinsan mo: '₱800 kada araw, work from home! Mag-post ka lang ng maganda tungkol kay Kandidato A at ng masama sa kalaban. Social Media Specialist ang title. May quota lang: 30 comments, 10 share, isang konsensya.'",
       en:"Your cousin texts: '₱800 a day, work from home! Just post nice things about Candidate A and nasty things about the rival. Title: Social Media Specialist. Small quota: 30 comments, 10 shares, one conscience.'"},
 ch:[[{tl:"Sige — trabaho 'yan, hindi pulitika.",en:"Fine — it's a job, not politics."},{w:8,p:0,rec:"trolljob"}],
     [{tl:"Hindi ako papasok — pero hahayaan ko na lang sila.",en:"Not for me — but I'll let them be."},{w:2,p:1,rec:"trolljob"}],
     [{tl:"Tanggihan — at sabihan ang tropa kung paano makilala ang mga 'specialist.'",en:"Decline — and teach the barkada how to spot the 'specialists.'"},{w:-3,p:2,rec:"trolljob"}]]},

{dim:"aware", tag:{tl:"ANG KANDIDATO SA SELDA",en:"THE CANDIDATE IN A CELL"},
 body:{tl:"May kandidato sa Senado na nakakulong dahil sa trafficking ng mga bata — kasama sa Most Wanted list ng ibang bansa. Sabi ng supporters: 'Persecuted siya, parang si Kristo.' Nasa balota pa rin ang pangalan niya, maayos ang pagkaka-print.",
       en:"A Senate candidate is in jail for child trafficking — on another country's Most Wanted list. His supporters say: 'He is persecuted, like Christ.' His name is still on the ballot, beautifully printed."},
 ch:[[{tl:"Isama sa 12 — kawawa naman, inaapi siya.",en:"Put him in my 12 — poor man, he's being persecuted."},{w:8,p:0,rec:"jailrun2"}],
     [{tl:"Ang taong hinahanap ng FBI ay hindi biktima ng chismis.",en:"A man wanted by the FBI is not a victim of gossip."},{w:-3,p:2,rec:"jailrun2"}]]},

{dim:"character", tag:{tl:"ANG BUS PAPUNTANG RALLY",en:"THE BUS TO THE RALLY"},
 body:{tl:"Kinasuhan ng plunder — non-bailable — ang senador ng simbahan ninyo. May nakahandang bus papuntang 'Prayer Rally for Justice.' May attendance sheet. Sabi ng kapatid mo: 'Field trip lang 'to na may spiritual dimension.'",
       en:"Your church's senator has been charged with plunder — non-bailable. A bus is ready for the 'Prayer Rally for Justice.' There is an attendance sheet. Your sibling says: 'It's just a field trip with a spiritual dimension.'"},
 ch:[[{tl:"Sumakay. Mahirap nang ma-absent.",en:"Get on the bus. Being absent is dangerous."},{w:8,p:0,rec:"rally"}],
     [{tl:"Biglang sumakit ang tiyan. Sayang.",en:"Sudden stomach ache. Such a shame."},{w:0,p:1,rec:"rally"}],
     [{tl:"Ang hustisya ay nasa korte, hindi sa headcount.",en:"Justice lives in a courtroom, not a headcount."},{w:-3,p:2,rec:"rally"}]]},

{dim:"aware", tag:{tl:"ANG FLOOD CONTROL",en:"THE FLOOD CONTROL"},
 body:{tl:"Baha na naman hanggang bewang. Pero ayon sa opisyal na records, TAPOS na ang flood control project sa inyo — dalawang beses pa itong na-ribbon-cutting, may fireworks pa ang ikalawa. Ngayon, pangako ni Kandidato A: 'MAS MARAMING flood control!'",
       en:"Waist-deep floods again. But according to official records, your flood-control project is FINISHED — it had two ribbon-cuttings, the second one with fireworks. Now Candidate A promises: 'MORE flood control!'"},
 ch:[[{tl:"Sana nga. Baka this time, totoo na.",en:"Here's hoping. Maybe this time it's real."},{w:7,p:0,rec:"ghost"}],
     [{tl:"100% disbursed, 0% built. Ang tanging natapos ay ang ribbon. Hanapin ang lumagda.",en:"100% disbursed, 0% built. Only the ribbon got finished. Find who signed."},{w:-3,p:2,rec:"ghost"}]]},

{dim:"intel", tag:{tl:"ANG PALIT-UPUAN",en:"THE SEAT-SWAP"},
 body:{tl:"Term limit na ni Mayor. Solusyon: si Misis ang tatakbong mayor, si Junior ang vice, si Ate ang congresswoman, si Kuya ang board member. Tarpaulin: 'BAGONG MUKHA, BAGONG PAG-ASA!' Parehong apelyido. Bagong gupit lang.",
       en:"The Mayor is termed out. Solution: the wife runs for mayor, Junior for vice, Big Sister for congresswoman, Big Brother for the board. Tarpaulin: 'NEW FACES, NEW HOPE!' Same surname. New haircuts."},
 ch:[[{tl:"Buti nga — may experience na ang buong pamilya.",en:"Good, actually — the whole family has experience now."},{w:7,p:0,rec:"dynasty"}],
     [{tl:"Hindi 'yan demokrasya. HR department 'yan ng iisang angkan.",en:"That's not democracy. That's one clan's HR department."},{w:-3,p:2,rec:"dynasty"}]]},

{dim:"intel", tag:{tl:"ANG BALIMBING",en:"THE TURNCOAT"},
 body:{tl:"Ang congressman ninyo, lumipat na naman ng partido — pangatlong beses sa anim na taon, laging papunta sa nanalo. Sabi niya sa press con: 'Matter of principle po ito.' Ang prinsipyo niya: manalo.",
       en:"Your congressman has switched parties again — third time in six years, always toward the winner. At the press con he says: 'This is a matter of principle.' His principle: winning."},
 ch:[[{tl:"Ganyan talaga ang laro. Practical siya.",en:"That's just the game. He's practical."},{w:6,p:0,rec:"balimbing"}],
     [{tl:"Ang partido ay panahon lang sa kanila. Ang boto ko ang tanging permanente.",en:"To them, parties are weather. My vote is the only permanent thing here."},{w:-2,p:2,rec:"balimbing"}]]},

{dim:"character", tag:{tl:"ANG ARESTO",en:"THE ARREST"},
 body:{tl:"Inaresto ang isang dating pangulo — libu-libo ang napatay sa kanyang 'gera.' Sabi ng kapitbahay mo: 'Disiplina 'yon! Wala tayong pakialam sa dayuhang korte!' Ang nanay ng isang napatay, tahimik lang: sampung taon na siyang hindi nakakatulog nang diretso.",
       en:"A former president is arrested — thousands died in his 'war.' Your neighbor says: 'That was discipline! Foreign courts should mind their business!' The mother of one of the dead says nothing: she hasn't slept a whole night in ten years."},
 ch:[[{tl:"Bayani pa rin siya para sa akin.",en:"He's still a hero to me."},{w:8,p:0,rec:"icc"}],
     [{tl:"May sinumpaang testimonya: may presyo kada bangkay. Ang may resibo kada patay ay hindi bayani.",en:"There's sworn testimony: a price per body. A man with receipts per corpse is not a hero."},{w:-4,p:2,rec:"icc"}]]},

{dim:"intel", tag:{tl:"ANG GROUP CHAT",en:"THE GROUP CHAT"},
 body:{tl:"Sabi sa GC: 'Trapo naman silang lahat. Lesser evil na lang. Pumili ka ng magaling mag-pagawa ng kalsada.' Napaisip ka: kung talagang pare-pareho lahat, bakit iisang kampo lang ang may apatnapu't-limang dokumentadong taktika?",
       en:"The group chat says: 'They're all trapos anyway. Just pick the lesser evil. Choose whoever builds roads.' You pause: if they're truly all the same, why does only one camp have forty-five documented tactics?"},
 ch:[[{tl:"Tama sila. Walang pinagkaiba, bakit pa mag-abala.",en:"They're right. No difference, why bother."},{w:7,p:0,rec:"nihilism"}],
     [{tl:"Ang 'lahat corrupt' ay linya mismo ng pinaka-corrupt. Kapag pinaniwalaan ko, panalo sila.",en:"'They're all corrupt' is the most corrupt player's own line. The moment I believe it, they win."},{w:-3,p:2,rec:"nihilism"}]]},

{dim:"aware", tag:{tl:"ANG BAGONG MUKHA SA BAYAN",en:"THE NEW FACE IN TOWN"},
 body:{tl:"May bagong kandidatong mayor sa kabilang bayan: walang kaklaseng nakakaalala sa kanya, kakaiba ang birth certificate, at ang campaign fund — mas malaki pa sa buong budget ng bayan. Pero ang gaganda ng mga basketball court na donasyon niya. May scoreboard pa.",
       en:"The next town has a new mayoral candidate: no classmate remembers her, the birth certificate is odd, and the campaign fund is bigger than the town's entire budget. But her donated basketball courts are gorgeous. With scoreboards."},
 ch:[[{tl:"Basta may binibigay, panalo sa akin.",en:"If she's giving things away, she's got my vote."},{w:7,p:0,rec:"sleeper"}],
     [{tl:"May bayan nang nadale sa ganyan — life sentence ang ending. Itanong muna kung saan galing ang pera.",en:"A town already fell for this — it ended in a life sentence. Ask where the money comes from first."},{w:-3,p:2,rec:"sleeper"}]]},

{dim:"aware", tag:{tl:"ANG ARTISTA SA BALOTA",en:"THE ACTOR ON THE BALLOT"},
 body:{tl:"Tumakbo sa Senado ang sikat na action star. Plataporma: ang catchphrase niya sa pelikula. Sa rally: sumayaw, nag-shadow boxing, namigay ng basketball, nag-selfie sa lahat. Sa debate: hindi dumating — 'may taping po.' Nangunguna siya sa survey.",
       en:"The famous action star is running for Senate. Platform: his movie catchphrase. At rallies: he dances, shadow-boxes, gives away basketballs, takes selfies with everyone. At the debate: absent — 'he had a taping.' He leads the surveys."},
 ch:[[{tl:"Iboto — kilala ko siya, mabait sa mga fans, at nakakatawa.",en:"Vote for him — I know him, he's nice to fans, and he's funny."},{w:8,p:0,rec:"artista"}],
     [{tl:"Fans' day ang alam niya, hindi budget hearing. Ang Senado ay trabaho, hindi encore.",en:"He knows fans' days, not budget hearings. The Senate is a job, not an encore."},{w:-3,p:2,rec:"artista"}]]},

{dim:"intel", tag:{tl:"ANG 'WALANG GINAWA'",en:"THE 'DID NOTHING'"},
 body:{tl:"Sabi ng kaibigan mo: 'Si Kandidato B? Walang ginawa 'yan.' Limang segundong Google: batas sa maternity leave, mental health law, batas laban sa online child abuse, imbestigasyon sa trafficker na pastor at sa mga scam hub. Ang mga batas kasi, walang tarpaulin na may mukha.",
       en:"Your friend says: 'Candidate B? She's done nothing.' A five-second Google: the maternity leave law, the mental health act, the anti-online-child-abuse law, the investigations into a trafficking pastor and the scam hubs. Laws just don't get tarpaulins with faces."},
 ch:[[{tl:"Kung may nagawa siya, dapat alam ko. Kasalanan niya kung hindi sikat.",en:"If she'd done anything, I'd know. Her fault for not being famous."},{w:6,p:0,rec:"lawlist"}],
     [{tl:"Hindi tarpaulin ang sukatan ng trabaho. Record ang binabasa, hindi recall.",en:"Work isn't measured in tarpaulins. You read the record, not the recall."},{w:-2,p:2,rec:"lawlist"}]]},

{dim:null, vote:true, tag:{tl:"MAYO 9, 2028 — ARAW NG HALALAN",en:"MAY 9, 2028 — ELECTION DAY"},
 body:{tl:"Mahaba ang pila, mainit ang araw. Sa loob ng booth: ikaw lang, ang balpen, at ang bansa. Walang deacon. Walang sobre. Walang survey. Walang tatay mo. Ito na 'yon.",
       en:"The line is long, the sun is hot. Inside the booth: just you, the pen, and the country. No deacon. No envelope. No survey. No father. This is it."},
 ch:[[{tl:"IBOTO SI KANDIDATO A",en:"VOTE CANDIDATE A"},{vote:"A"}],
     [{tl:"IBOTO SI KANDIDATO B",en:"VOTE CANDIDATE B"},{vote:"B"}],
     [{tl:"Iwanang blanko.",en:"Leave it blank."},{vote:"X"}]]}
];

  early:{tl:"🌊 LUMUBOG BAGO PA ANG HALALAN",en:"🌊 SANK BEFORE THE ELECTION"},
  awake:{tl:"BUMOTO AKO NANG GISING 🇵🇭",en:"I VOTED WIDE AWAKE 🇵🇭"},
  asleep:{tl:"BUMOTO AKO NANG NAKAPIKIT 🇵🇭",en:"I VOTED WITH EYES CLOSED 🇵🇭"},
  challenge:{tl:"Kaya mo bang lumangoy? Subukan mo.",en:"Can you swim? Try it yourself."},
  again:{tl:"Ulitin — Ibang Pilipinas Naman",en:"Play Again — A Different Philippines"},
  receipts:{tl:"ANG MGA RESIBO — dokumentado lahat",en:"THE RECEIPTS — all documented"},
  noname:{tl:"*Walang totoong pangalan sa larong ito. Ang mga taktika lang ang totoo.",en:"*No real names appear in this game. Only the tactics are real."},
  grades:{tl:["BUDOL-BUDOL","INAANTOK","MEDYO GISING","GISING NA GISING"],en:["FULLY BUDOL-ED","DROWSY","HALF AWAKE","WIDE AWAKE"]}
};

function hud(){
  return `<header><h1>SAGIP PILIPINAS 2028</h1><div class="sub">Sink or Swim</div>
  <button id="langbtn">${LANG==="tl"?"EN":"TL"}</button></header>
  <div id="hud"><span>${T(UI.chapter)} <b>${Math.min(G.i+1,V.length)}/${V.length}</b></span>
  <span>${T(UI.water)}: <b>${G.water}%</b> <span id="gauge">· ${T(floodLabel())}</span></span></div>
  <div id="ticker">${T(TICKER[G.i % TICKER.length])}</div>`;
}
function bindLang(rerender){ const b=document.getElementById("langbtn"); if(b) b.onclick=()=>{ LANG=(LANG==="tl")?"en":"tl"; rerender(); }; }

function show(){
  const v=V[G.i];
  if(!v){ finale(); return; }
  const btns=v.ch.map((c,idx)=>`<button data-i="${idx}">${T(c[0])}</button>`).join("");
  app.innerHTML=hud()+`<div id="stage"><div class="card">
    <div class="tag">${T(v.tag)}</div><p>${T(v.body)}</p>${v.quote?`<div class="quote">${T(v.quote)}</div>`:""}
    <div class="choices">${btns}</div></div></div>`;
  bindLang(show);
  document.querySelectorAll(".choices button").forEach(b=>{ b.onclick=()=>pick(v, v.ch[+b.dataset.i][1]); });
}

function pick(v,fx){
  if(fx.vote){ G.vote=fx.vote; G.i++; finale(false); return; }
  if(v.dim){ G.dims[v.dim][0]+=fx.p||0; G.dims[v.dim][1]+=2; }
  if(fx.w) G.water=Math.max(5,Math.min(100,G.water+fx.w));
  if(fx.rec) G.seen.add(fx.rec);
  G.i++;
  if(G.water>=100){ finale(true); return; }   /* drowned before election day */
  draw(); show();
}

function dimBars(){
  let h="";
  for(const k of ["aware","conscience","intel","character"]){
    const [got,max]=G.dims[k]; const pct=max?Math.round(100*got/max):0;
    h+=`<div class="dim"><div class="lbl"><span>${T(DIMLBL[k])}</span><span>${pct}%</span></div>
        <div class="bar"><i style="width:${pct}%"></i></div></div>`;
  }
  return `<div id="dims">${h}</div>`;
}

function finale(early){
  if(early!==undefined) G.early = early;
  const isE = !!G.early;
  if(!G.done){
    if(isE){ G.water=100; }
    else{
      if(G.vote==="A") G.water=Math.min(100,G.water+22);
      if(G.vote==="B") G.water=Math.max(6,G.water-22);
      if(G.vote==="X") G.water=Math.min(100,G.water+12);
    }
    G.done = true;
  }
  draw();
  const sank = isE ? true : (G.vote==="X" ? true : G.water>=50);
  const track = (isE?FUT.early:(G.vote==="X"?FUT.blank:(sank?FUT.sink:FUT.swim)))[LANG];
  let got=0,max=0; Object.values(G.dims).forEach(d=>{got+=d[0];max+=d[1];});
  const pct = max?Math.round(100*got/max):0;
  const grade = T(UI.grades)[ pct>=80?3 : pct>=55?2 : pct>=30?1 : 0 ];
  const heads = track.map(h=>`<div><b>${h[0]}</b> — ${h[1]}</div>`).join("");
  let li=""; G.seen.forEach(k=>{ const r=RECEIPTS[k][LANG]; li+=`<li><b>${r[0]}.</b> ${r[1]}</li>`; });
  app.innerHTML=hud()+`<div class="screen">
    <h2>${isE?T(UI.early):(sank?T(UI.sank):T(UI.swam))}</h2>
    <div id="headlines">${heads}</div>
    ${dimBars()}
    <div class="sharecard">
      <div class="big">${pct>=55?T(UI.awake):T(UI.asleep)}</div>
      <div class="pct">${pct}%</div>
      <div style="font-size:.85rem;font-weight:700;">${grade}</div>
      <div style="font-size:.78rem;color:#5c718a;margin-top:6px;">${T(UI.challenge)}</div>
    </div>
    <p class="fine" style="margin-top:10px;">${T(UI.noname)}</p>
    <div id="receipts"><h3 class="fine" style="letter-spacing:.16em;margin-bottom:6px;">${T(UI.receipts)}</h3><ul>${li}</ul></div>
    <button class="btn" onclick="location.reload()">${T(UI.again)}</button>
  </div>`;
  bindLang(finale);
}

function title(){
  app.innerHTML=`<div class="screen">
    <h2 style="font-size:1.9rem;">SAGIP PILIPINAS<br>2028</h2>
    <p class="fine" style="letter-spacing:.28em;text-transform:uppercase;">Sink or Swim</p>
    <p style="margin-top:14px;">${LANG==="tl"?"Isang boto ka lang. Kaya nga nila pinag-aagawan.":"You are just one vote. That's exactly why they're all fighting for it."}</p>
    <p class="fine">${LANG==="tl"?"Walang totoong pangalan dito. Ang mga taktika lang ang totoo — lahat dokumentado, lahat may resibo sa dulo. Susukatin ng laro ang apat: Kamalayan, Konsensya, Katalinuhan, Pagkatao.":"No real names appear here. Only the tactics are real — all documented, all receipted at the end. The game measures four things: Awareness, Conscience, Critical Thinking, Character."}</p>
    <p class="fine">${LANG==="tl"?"Ninakaw na nila ang pondo ng flood control — ₱118 bilyon kada taon. Kaya ngayon, tumataas ang baha sa bawat pagkakataong nauto ka. Ang huling harang sa baha: ang boto mo. Sa Mayo 9, lumangoy o lumubog.":"They already stole the flood-control funds — ₱118 billion a year. So now the floodwater rises every time you get played. The last flood barrier left is your vote. On May 9: sink or swim."}</p>
    <button class="btn" onclick="startGame()">${LANG==="tl"?"Gisingin Mo Ako":"Wake Me Up"}</button>
    <div><button class="btn alt" id="titlelang">${LANG==="tl"?"Play in English":"Maglaro sa Tagalog"}</button></div>
    <p class="fine" style="margin-top:12px;">Prototype v0.3 · ${LANG==="tl"?"kapatid ng":"sister game of"} CHURCH, INC.</p>
  </div>`;
  document.getElementById("titlelang").onclick=()=>{ LANG=(LANG==="tl")?"en":"tl"; title(); };
}
window.startGame=function(){ G.i=0; draw(); show(); };
draw(14); title();
</script>
</body>
</html>
