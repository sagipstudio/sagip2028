/* engine ----------------------------------------------------------------- */
let queue=[], app=document.getElementById("app");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildQueue(){
  queue = shuffle(DECK.slice());
  // keep intro first
  queue.sort((a,b)=>(a.tag==="THE CALLING"?-1:0)-(b.tag==="THE CALLING"?-1:0));
}

function nextCard(){
  for(let i=0;i<queue.length;i++){
    const c=queue[i];
    if(!c.req || S.flags[c.req]){ queue.splice(i,1); return c; }
  }
  return null;
}

function meterBar(label,val,warn){
  return `<div class="meter"><div class="label">${label}</div>
    <div class="bar ${warn?"warn":""}"><i style="width:${val}%"></i></div></div>`;
}

function renderHUD(){
  return `<header><h1>CHURCH, INC.</h1><div class="sub">Salvation Sold Separately</div></header>
  <div id="meters">
    ${meterBar("✝ Vibes",S.v,S.v<20||S.v>85)}
    ${meterBar("₱ Blessings",S.b,S.b<20||S.b>85)}
    ${meterBar("🕶 Deniability",S.d,S.d<25)}
  </div>
  <div id="status"><span>Year of Our Lord ${S.year}</span><span>${S.followers.toLocaleString()} souls on the rolls*</span></div>`;
}

function apply(e){
  if(!e) return;
  if(e.v)S.v=clamp(S.v+e.v); if(e.b)S.b=clamp(S.b+e.b); if(e.d)S.d=clamp(S.d+e.d);
  if(e.c)S.conscience+=e.c; if(e.r)S.reckon+=e.r;
  if(e.f)S.flags[e.f]=true; if(e.rec)S.receipts.add(e.rec);
}

function tick(){
  S.year += 2+Math.floor(Math.random()*2);
  const growth = Math.round(S.followers*(0.06+S.v/400));
  S.followers += (S.flags.blind? Math.max(growth,120) : growth) - (S.flags.hunted?Math.floor(S.followers*0.01):0);
}

function checkEnd(){
  if(S.v<=0) return "schism";
  if(S.v>=100) return "deified";
  if(S.b<=0) return "broke";
  if(S.b>=100) return "forbes";
  if(S.d<=0) return S.reckon>=14 ? "hague" : "indicted";
  return null;
}

function showCard(){
  const c = nextCard();
  if(!c){ endGame( S.conscience>=12 ? "dismantle" : (S.reckon>=16 ? "hague" : "dynasty") ); return; }
  app.innerHTML = renderHUD() + `
   <div id="cardZone"><div class="card">
     <div class="tag">${c.tag}</div>
     ${c.verse?`<p class="verse">${c.verse}</p>`:""}
     <p class="body">${c.body}</p>
   </div></div>
   <div id="choices">
     <button id="L">${c.l[0]}</button>
     <button id="R">${c.r[0]}</button>
   </div>
   <footer>*figure supplied by deacons and therefore true</footer>`;
  document.getElementById("L").onclick=()=>{ apply(c.l[1]); after(); };
  document.getElementById("R").onclick=()=>{ apply(c.r[1]); after(); };
}

function after(){
  tick();
  const e=checkEnd();
  if(e){ endGame(e); } else { showCard(); }
}

function receiptsHTML(){
  if(S.receipts.size===0) return "<p class='fine'>You finished with no receipts. Remarkable. Almost suspicious.</p>";
  let li="";
  S.receipts.forEach(k=>{ const c=CODEX[k]; if(c) li+=`<li><b>${c[0]}.</b> <span>${c[1]}</span></li>`; });
  return `<div id="receipts"><h3>The Receipts — you thought we made this up</h3><ul>${li}</ul></div>`;
}

function endGame(key){
  S.over=true;
  const [title,text]=ENDINGS[key];
  app.innerHTML = renderHUD() + `<div class="screen">
    <h2>${title}</h2>
    <p>${text}</p>
    <p class="fine">Reign: ${S.year-1926} years · ${S.followers.toLocaleString()} souls on the rolls · Reckoning tokens: ${S.reckon} · Conscience: ${S.conscience}</p>
    ${receiptsHTML()}
    <button onclick="location.reload()">Found Another Church</button>
  </div>`;
}

function title(){
  app.innerHTML = `<div class="screen">
    <h2 style="font-size:2rem;letter-spacing:.2em;">CHURCH, INC.</h2>
    <p class="fine" style="letter-spacing:.3em;text-transform:uppercase;">Salvation Sold Separately</p>
    <p style="margin-top:22px;">The Republic of Maharlika, 1926. A chapel with a leaking roof, a Bible with promising ambiguities, and a century of opportunity.</p>
    <p class="fine">Grow the flock. Twist the Word. Rent the state. Mind your three meters — and the two you cannot see.</p>
    <p class="fine">Every dark mechanic in this game is documented. The receipts arrive at the end. They always do.</p>
    <button onclick="startGame()">Answer the Calling</button>
    <p class="fine" style="margin-top:18px;">Prototype v0.1 — The Shepherd campaign · The Senator campaign: awaiting quorum</p>
  </div>`;
}

window.startGame=function(){ buildQueue(); showCard(); };
title();
</script>
</body>
</html>
