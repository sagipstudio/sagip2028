 l:[{tl:"Hayaan silang umalis",en:"Let them go"},{b:-4,c:+3,rec:"leavers"}], r:[{tl:"Habulin. 'Ibalik sa kawan.'",en:"Shepherd them home. Vigorously."},{v:+3,r:+3,f:"hunted",rec:"leavers"}]},

{tag:{tl:"DAYUHANG MEDIA",en:"FOREIGN PRESS"},
 body:{tl:"May dumating na documentary crew mula sa Canada. Kinukunan nila lahat. Suhestiyon ng security: ilawan ang mga camera nila para bulag, tapos butasin ang gulong nila.",
       en:"A documentary crew has arrived from a cold, polite country. They film everything. Security proposes the standard package: spotlights into their lenses, and a knife for their tires."},
 l:[{tl:"Buksan lahat. Walang itatago.",en:"Full access. Hide nothing."},{v:-4,d:+5,c:+2,rec:"cbc"}], r:[{tl:"Sige. 'Yung standard package.",en:"The standard package"},{d:-7,r:+3,f:"slashed",rec:"cbc"}]},

{tag:{tl:"UMERE NA",en:"BROADCAST"}, req:"slashed",
 body:{tl:"Lumabas na ang documentary nila sa abroad. Ang unang eksena: 'yung gulong na binutas ng tao mo. Sabi ng abogado mo: 'Idemanda natin sila sa Canada. Madali lang po 'yon.'",
       en:"Their documentary airs abroad. The slashed tires are the opening shot. Your lawyer proposes suing them in their own courts, which he describes as 'a formality.'"},
 l:[{tl:"Hayaan na lang",en:"Let it fade"},{v:-3}], r:[{tl:"Idemanda sila sa Canada",en:"Sue abroad (a formality)"},{b:-8,r:+3,d:-3}]},

{tag:{tl:"PALABAS",en:"SPECTACLE"},
 body:{tl:"Suhestiyon ng staff: gumawa tayo ng world record! Pinakamalaking fireworks display sa buong mundo. Kapag ganito kasi, walang magsusulat ng 'kulto' — 'simbahan' agad ang tawag ng balita.",
       en:"The Ministry of Records proposes a world record: the largest fireworks display in human history. Eight hundred thousand fireworks. The word 'cult' will appear in zero headlines."},
 l:[{tl:"Walang mabubusog sa paputok",en:"Fireworks don't feed anyone"},{v:-2,c:+1}], r:[{tl:"Sindihan ang langit",en:"Light the sky"},{b:-9,v:+8,d:+5,rec:"record"}]},

{tag:{tl:"BILIHIN",en:"ACQUISITIONS"},
 body:{tl:"May binebentang BUONG BAYAN sa Amerika. Walang nakatira, 40 ektarya, mura. Hindi nagtanong ang broker kung bakit kailangan ng simbahan ng bayang walang tao. Hindi mo rin sinabi.",
       en:"An empty town is for sale in a foreign prairie. Forty hectares, one saloon, zero inhabitants. The broker does not ask why a church needs a ghost town. You do not tell him."},
 l:[{tl:"'Wag na",en:"Pass"},{}], r:[{tl:"Bilhin ang buong bayan",en:"Buy the ghost town"},{b:-7,d:+3,rec:"ghosttown"}]},

{tag:{tl:"ANG DIKTADOR",en:"THE STRONGMAN"},
 body:{tl:"May heneral na nag-declare ng Martial Law. Kagabi, ipinasara niya ang radio station mo. Kaninang umaga, may sugo siya: ibabalik daw ito — may kasama pang kontrata at lupa. Ang kapalit: ang suporta mo.",
       en:"A general has declared himself the cure for history. His soldiers shut your radio station at midnight — then at dawn his envoy arrives, offering it back. Plus contracts. Plus land. He only wants what everyone wants: everything."},
 l:[{tl:"Lumayo sa kanya",en:"Keep your distance"},{b:-6,v:-2,c:+2,f:"distant"}], r:[{tl:"Suportahan ang Diktador",en:"Bless the cure"},{b:+12,r:+4,f:"blessed",rec:"strongman"}]},

{tag:{tl:"ANG LISTAHAN",en:"THE LIST"}, req:"blessed",
 body:{tl:"Pinapapatay na ng Diktador ang mga 'adik.' Ang hiling niya sa'yo: ipangaral mong may kasalanan lahat ng namatay. Naka-draft na ang sermon. May binayaran kada pangalan dito.",
       en:"The Strongman's police now solve poverty by subtraction. He asks you to preach that the dead were all guilty. The sermon is already drafted. Someone was paid per name on it."},
 l:[{tl:"Hindi ko ipapangaral 'yan",en:"Refuse the sermon"},{d:-5,b:-5,c:+4}], r:[{tl:"Ipangaral ito",en:"Preach it"},{v:+6,r:+6,f:"complicit",rec:"thelist"}]},

{tag:{tl:"ANG TAMANG ORAS",en:"THE HOUR"}, req:"blessed",
 body:{tl:"Nag-aalsa na ang mga tao sa kalye. Bumabagsak na ang mga estatwa ng Diktador. Ang problema: naka-frame sa palasyo niya ang endorsement mo. May iisang tamang oras para tumalikod sa kanya — NGAYON NA.",
       en:"Crowds fill the streets. The Strongman's statues are coming down in real time. Your endorsement of him is framed in his palace lobby. There is exactly one correct hour to switch sides, and it is now-ish."},
 l:[{tl:"Sasamahan ko siya hanggang dulo",en:"Loyalty to the end"},{v:-9,b:-8,r:+2}], r:[{tl:"Biglang ma-realize: mahal ko pala ang demokrasya!",en:"Discover, publicly, that you always loved democracy"},{v:+6,d:+4,rec:"strongman"}]},

{tag:{tl:"ANG PAGDINIG",en:"THE HEARING"},
 body:{tl:"May senadora na nag-subpoena ng mga libro mo. Hindi mo siya kontrolado. Suhestiyon ng mga alyado mo: kasuhan SIYA — ng mismong krimen na ginawa mo. Gagana raw. Lagi raw gumagana.",
       en:"A senator — author of beloved laws, chair of nothing you control — has subpoenaed your books. Your allies propose the mirror-charge: accuse HER of the thing you did. The projection is, historically, reliable."},
 l:[{tl:"Sumipot at magsinungaling nang naka-panunumpa",en:"Appear. Testify. Gaslight under oath."},{v:-3,d:-4,r:+1,rec:"hearing"}], r:[{tl:"Ikaso sa kanya ang krimen ko",en:"File the mirror-charge"},{d:-6,r:+4,f:"mirrored",rec:"mirror"}]},

{tag:{tl:"ANG TESTIGO",en:"THE WITNESS"}, req:"mirrored",
 body:{tl:"May dating pastoral na tetestigo sana laban sa'yo. Biglang may kumalat na video: nagbabawi na siya — pero takot na takot ang mga mata niya, may tinitingnan sa labas ng camera. Nag-file agad ng kaso ang senadora.",
       en:"A former pastoral was set to testify. A video surfaces instead: she recants, eyes darting off-camera to someone holding either cue cards or her family. The senator files cyberlibel within the hour."},
 l:[{tl:"Pakawalan siya. Burahin ang video.",en:"Release her. Withdraw the video."},{v:-4,c:+4}], r:[{tl:"I-share pa lalo ang video",en:"Amplify the recantation"},{v:+4,r:+4,d:-4,rec:"hearing"}]},

{tag:{tl:"ANG SENADOR NATIN",en:"OUR MAN IN THE SENATE"}, req:"comelec",
 body:{tl:"Si Brother Marcival — ang senador mo, ang tao mo sa balota — kinasuhan ng plunder. ₱75 milyon. Non-bailable. Naghihintay ang mga miyembro: ano ang sasabihin mo?",
       en:"Brother Marcival — your man, your ballot line, your senator — has been charged with plunder over ₱75 million in 'donations.' Non-bailable. The faithful await the headline you choose."},
 l:[{tl:"'Hayaan natin ang korte.' (Bitawan siya)",en:"Headline: PLUNDER (let him fall)"},{v:-8,d:+4,c:+2,rec:"senator"}], r:[{tl:"'PERSECUTION! Rally tayo bukas!'",en:"Headline: PERSECUTION (rally the avenue)"},{v:+6,d:-7,r:+3,f:"occupied2",rec:"senator"}]},

{tag:{tl:"ANG DAYUHANG AMO",en:"THE PATRON"},
 body:{tl:"May alok ang isang dayuhang embahada: sampung libong online accounts na magmamahal sa'yo, 24 oras, hindi natutulog, hindi kumokontra. Libre raw. Walang libre.",
       en:"A foreign embassy's cultural attaché admires your broadcasting arm. He offers 'audience development' — ten thousand accounts that never sleep and never disagree. Free. Which is, of course, the price."},
 l:[{tl:"Tanggihan",en:"Decline the choir"},{d:+2,c:+1}], r:[{tl:"Tanggapin ang mga fake account",en:"Accept the ghost choir"},{v:+7,r:+3,f:"patron",rec:"patron"}]},

{tag:{tl:"ANG MAPA",en:"CARTOGRAPHY"}, req:"patron",
 body:{tl:"May bagong dash ang mapa ng dayuhang Amo — sa dagat natin. Ang script na ibinigay para sa news anchors mo: 'Ganyan na 'yan dati pa.' May libing ng mangingisda sa mismong oras ng fireworks mo.",
       en:"The Patron's new map of the sea has grown a dash. Your news anchors have been provided the official position: the map has always had ten dashes. A fisherman's funeral is scheduled opposite your fireworks."},
 l:[{tl:"Ibalita ang totoo: may bagong dash",en:"Mention the dash"},{d:-4,v:-2,c:+2,rec:"dash"}], r:[{tl:"'Ganyan na 'yan dati pa.'",en:"The map has always had ten dashes"},{v:+3,r:+2,rec:"dash"}]},

{tag:{tl:"ANG KAKUMPITENSYA",en:"THE COMPETITION"},
 body:{tl:"Naaresto ang karibal mong pastor — 'Anak ng Diyos' daw siya, sabi niya mismo. Ang kaso: trafficking ng mga bata. Pero tatakbo pa rin daw siyang senador — mula sa loob ng kulungan. Sabi ng mga tagasunod niya: inaapi lang siya.",
       en:"The Appointed Son of God (self-styled; franchise rival) has been arrested for what the indictment calls, at length, everything. He announces his Senate run from Cell Block D. His followers call it persecution. His lawyers call it 'novel.'"},
 l:[{tl:"Ipagdasal siya sa publiko",en:"Publicly pray for him (solidarity of shepherds)"},{v:+2,r:+1,rec:"jailrun"}], r:[{tl:"Tahimik na kunin ang mga miyembro niya",en:"Quietly absorb his congregations"},{v:+6,b:+6,d:-2,rec:"jailrun"}]},

{tag:{tl:"ANG REPORMISTA",en:"THE REFORMER"},
 body:{tl:"Ang senadorang nag-iimbestiga sa'yo — siya rin ang gumawa ng Mental Health Act. Mahal siya ng mga nanay. Sabi ng consultants mo: 'Papalimutin muna natin sa tao ang batas niya. Saka natin siya sisirain.' Malaki ang budget.",
       en:"The senator investigating you also wrote the Mental Health Act. The mothers love her. Your consultants explain, with slides: the country must first forget the law to hate its author. Budget: considerable."},
 l:[{tl:"May mga taong hindi kayang sirain ng pera",en:"Some people cannot be bought down"},{d:-2,c:+2,rec:"reformer"}], r:[{tl:"Pondohan ang paninira",en:"Fund the forgetting"},{b:-8,d:+4,r:+4,rec:"reformer"}]},

{tag:{tl:"ANG TAGAPAGMANA",en:"SUCCESSION"},
 body:{tl:"Kabisado na ng anak mo ang mga sermon mo. Sabi ng council: 'nasa Bibliya' raw na dapat anak mo ang papalit sa'yo. Wala naman talaga sa Bibliya. Pero sino ba namang magrereklamo?",
       en:"Your son sits in the front pew now, mouthing your sermons a half-second early. The Sanggunian notes that hereditary succession has 'strong scriptural precedent,' which is not true, which has never mattered."},
 l:[{tl:"Hindi dapat minamana ang simbahan",en:"The church should outgrow one family"},{v:-4,c:+3,f:"open"}], r:[{tl:"Sanayin ang bata",en:"Groom the boy"},{v:+5,f:"dynasty"}]},

{tag:{tl:"ANG PULIS",en:"THE OFFICER"}, req:"occupied2",
 body:{tl:"May police general na miyembro mo — bininyagan noong bata pa, 40 taon nang tapat. Inutusan siyang arestuhin si Brother Marcival. Humihingi siya ng basbas mo: 'Trabaho ko po ito.' Nasa third row ang nanay niya, nagdadasal.",
       en:"A police general — a member, baptized at nine, faithful for forty years — has been ordered to serve the warrant on Brother Marcival. He asks for your blessing to do his duty. His mother is in the third pew."},
 l:[{tl:"Basbasan siya. Trabaho niya 'yon.",en:"Bless his duty"},{v:-6,d:+3,c:+4}], r:[{tl:"I-tiwalag siya. Pati ang nanay niya.",en:"Expel him (tiwalag). His mother too."},{v:+7,r:+5,f:"purgedcop",rec:"purge"}]}
];

const ENDINGS={
 schism:{tl:["WALANG LAMAN ANG SIMBAHAN","Unti-unting umalis ang mga tao. Walang gulo, walang sigawan — basta na lang nawala. Apat na deacon ang nakinig sa huling sermon mo. Ang tatlo, nagbibilang ng kubyertos."],
        en:["EMPTY PEWS","The doctrine debt was called in. The pews emptied not with a bang but with a shrug — the Fade, complete. Your last sermon was attended by four deacons, three of whom were counting the silverware."]},
 deified:{tl:["ANG 'DIYOS'","Sobrang taas na ng paniniwala sa'yo — hindi ka na mensahero, ikaw na mismo ang sinasamba. Mukhang panalo. Pero ang taong naging 'diyos' ay hindi na makakababa pa. Nakakulong ka na sa sarili mong altar."],
        en:["THE APPOINTED","Unity hit a number with no remainder for doubt. Somewhere in the applause you stopped being the messenger and became the message. Self-deification is not an exit; it is a locked door that worships itself."]},
 broke:{tl:["BANGKAROTE","Naubos ang pera. Ang mga jet: inuupahan lang pala. Ang arena: naka-sangla. Ang bayan sa Amerika: walang gustong bumili. Darating ang mga taga-bangko sa Lunes. Magalang sila. May dala silang computation. Tama pa."],
        en:["CHAPTER 11:1–4","Blessings ran dry. The jets were leased, the arena mortgaged, the ghost town — unsellable, obviously. The receivers arrive Monday. They are very polite. They have a spreadsheet. It is, annoyingly, accurate."]},
 forbes:{tl:["SOBRANG YAMAN","Napasok ka sa listahan ng pinakamayayaman. Ang tawag ng Forbes: fortune. Ang tawag ng BIR: Exhibit A. May sobrang liwanag na nakakabulag — sa'yo."],
        en:["THE RICH LIST","You made a list you cannot tithe your way off. Forbes called it a fortune; the tax bureau called it Exhibit A. Too much light is also an exposure."]},
 indicted:{tl:["ANG PROSECUTOR","Naubos ang palusot mo. 'Yung batang prosecutor noon? Tatlumpung taon niyang pinalago ang file mo. Ang mga file, hindi tulad ng mga testigo, hindi nagbabawi."],
        en:["THE PROSECUTOR","Plausible deniability reached zero — there was nothing left to plausibly deny. The young prosecutor's file had grown for thirty years. Files, unlike witnesses, do not recant."]},
 hague:{tl:["ANG PANINGIL","Ganito talaga ito dumating: dahan-dahan, tapos isang umaga na lang, andiyan na. Ang eroplano. Ang warrant. Ang korteng mali pa ang spelling ng pangalan mo. 'Yung testimonya na sabi nila 'walang kwenta' noon? Binasa nang buo. Hindi ito tumanda."],
        en:["THE RECKONING","It arrived the way it always does: slowly, then in a single morning. The plane. The warrant. The dock with your name misspelled. The transcript they said was worthless in Year 12 was read aloud in full. It had not aged."]},
 dynasty:{tl:["ANG DINASTIYA","Namatay ka sa kama. Mahal ka ng lahat, walang kaso, milyun-milyon ang nagluksa — sa mga TV channel na pag-aari mo. Ipinatong ng anak mo ang kamay niya sa parehong pinilipit na talata. Walang napalampas na kolekta. Ito ang ending kung saan panalo ang makina. Kadalasan, panalo ito."],
        en:["THE DYNASTY","You died in bed, beloved, unindicted, mourned by millions on channels you own. Your son placed his hand on the same twisted verse. The machine did not miss a single collection. This is the ending where the machine wins. It usually does."]},
 dismantle:{tl:["ANG PAGWASAK","Ginastos mo lahat — bawat pabor, bawat sikreto, bawat kakampi — para gibain ang makina mula sa loob. Ang natirang simbahan: maliit, mahirap, tapat. Labing-isang upuan. Butas pa rin ang bubong. Sapat na. Noon pa man, sapat na."],
        en:["THE DISMANTLING","You spent it all — every favor, every secret, every deacon — burning the machine from the inside. The church that remains is small, poor, and honest. Eleven pews. One leak in the roof. It is enough. It was always enough."]}
};

const UI={
 year:{tl:"Taon",en:"Year of Our Lord"},
 souls:{tl:"miyembro sa listahan*",en:"souls on the rolls*"},
 foot:{tl:"*galing sa report ng mga deacon, kaya siguradong totoo",en:"*figure supplied by deacons and therefore true"},
 rec:{tl:"ANG MGA RESIBO — hindi namin ito imbento",en:"The Receipts — you thought we made this up"},
 norec:{tl:"Natapos ka nang walang resibo. Galing. Medyo kahina-hinala.",en:"You finished with no receipts. Remarkable. Almost suspicious."},
 reign:{tl:"Tagal ng paghahari",en:"Reign"}, yrs:{tl:"taon",en:"years"},
 rtok:{tl:"Mga kasalanang may resibo",en:"Reckoning tokens"}, cons:{tl:"Konsensya",en:"Conscience"},
 again:{tl:"Magtayo Ulit ng Simbahan",en:"Found Another Church"},
 mV:{tl:"✝ Vibes",en:"✝ Vibes"}, mB:{tl:"₱ Pera",en:"₱ Blessings"}, mD:{tl:"🕶 Palusot",en:"🕶 Deniability"}
};

let queue=[], app=document.getElementById("app");
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQueue(){
  queue=shuffle(DECK.slice());
  queue.sort((a,b)=>((a.tag.en==="THE CALLING")?-1:0)-((b.tag.en==="THE CALLING")?-1:0));
}
function nextCard(){
  for(let i=0;i<queue.length;i++){ const c=queue[i];
    if(!c.req||S.flags[c.req]){ queue.splice(i,1); return c; } }
  return null;
}
function meterBar(label,val,warn){
  return `<div class="meter"><div class="label">${label}</div>
    <div class="bar ${warn?"warn":""}"><i style="width:${val}%"></i></div></div>`;
}
function renderHUD(){
  return `<header><h1>CHURCH INCORPORATED</h1>
  <div class="sub">${LANG==="tl"?"Ang Negosyo ng Kaligtasan":"Salvation Sold Separately"}</div>
  <button id="langbtn">${LANG==="tl"?"EN":"TL"}</button></header>
  <div id="meters">
    ${meterBar(T(UI.mV),S.v,S.v<20||S.v>85)}
    ${meterBar(T(UI.mB),S.b,S.b<20||S.b>85)}
    ${meterBar(T(UI.mD),S.d,S.d<25)}
  </div>
  <div id="status"><span>${T(UI.year)} ${S.year}</span><span>${S.followers.toLocaleString()} ${T(UI.souls)}</span></div>`;
}
function bindLang(f){ const b=document.getElementById("langbtn"); if(b)b.onclick=()=>{LANG=LANG==="tl"?"en":"tl";f();}; }
function apply(e){
  if(!e)return;
  if(e.v)S.v=clamp(S.v+e.v); if(e.b)S.b=clamp(S.b+e.b); if(e.d)S.d=clamp(S.d+e.d);
  if(e.c)S.conscience+=e.c; if(e.r)S.reckon+=e.r;
  if(e.f)S.flags[e.f]=true; if(e.rec)S.receipts.add(e.rec);
}
function tick(){
  S.year+=2+Math.floor(Math.random()*2);
  const g=Math.round(S.followers*(0.06+S.v/400));
  S.followers+=(S.flags.blind?Math.max(g,120):g)-(S.flags.hunted?Math.floor(S.followers*0.01):0);
}
function checkEnd(){
  if(S.v<=0)return"schism"; if(S.v>=100)return"deified";
  if(S.b<=0)return"broke"; if(S.b>=100)return"forbes";
  if(S.d<=0)return S.reckon>=14?"hague":"indicted";
  return null;
}
let CUR=null;
function showCard(){
  if(!CUR) CUR=nextCard();
  const c=CUR;
  if(!c){ endGame(S.conscience>=12?"dismantle":(S.reckon>=16?"hague":"dynasty")); return; }
  app.innerHTML=renderHUD()+`
   <div id="cardZone"><div class="card">
     <div class="tag">${T(c.tag)}</div>
     ${c.verse?`<p class="verse">${T(c.verse)}</p>`:""}
     <p class="body">${T(c.body)}</p>
   </div></div>
   <div id="choices">
     <button id="L">${T(c.l[0])}</button>
     <button id="R">${T(c.r[0])}</button>
   </div>
   <footer>${T(UI.foot)}</footer>`;
  bindLang(showCard);
  document.getElementById("L").onclick=()=>{apply(c.l[1]);CUR=null;after();};
  document.getElementById("R").onclick=()=>{apply(c.r[1]);CUR=null;after();};
}
function after(){ tick(); const e=checkEnd(); if(e){endGame(e);}else{showCard();} }
function receiptsHTML(){
  if(S.receipts.size===0)return`<p class='fine'>${T(UI.norec)}</p>`;
  let li=""; S.receipts.forEach(k=>{const c=CODEX[k][LANG]; if(c)li+=`<li><b>${c[0]}.</b> <span style="color:var(--muted);font-style:italic;">${c[1]}</span></li>`;});
  return`<div id="receipts"><h3>${T(UI.rec)}</h3><ul>${li}</ul></div>`;
}
let ENDKEY=null;
function endGame(key){
  if(key)ENDKEY=key;
  const e=ENDINGS[ENDKEY][LANG];
  S.over=true;
  app.innerHTML=renderHUD()+`<div class="screen">
    <h2>${e[0]}</h2>
    <p>${e[1]}</p>
    <p class="fine">${T(UI.reign)}: ${S.year-1926} ${T(UI.yrs)} · ${S.followers.toLocaleString()} ${T(UI.souls).replace("*","")} · ${T(UI.rtok)}: ${S.reckon} · ${T(UI.cons)}: ${S.conscience}</p>
    ${receiptsHTML()}
    <button onclick="location.reload()">${T(UI.again)}</button>
  </div>`;
  bindLang(()=>endGame());
}
function title(){
  app.innerHTML=`<div class="screen">
    <h2 style="font-size:2.1rem;letter-spacing:.18em;">CHURCH<br>INCORPORATED</h2>
    <p class="fine" style="letter-spacing:.26em;text-transform:uppercase;">${LANG==="tl"?"Ang Negosyo ng Kaligtasan":"Salvation Sold Separately"}</p>
    <p style="margin-top:22px;">${LANG==="tl"
      ?"Republika ng Maharlika, 1926. May maliit kang kapilya, isang Bibliya, at isang malaking tanong: gaano ka kayaman — at gaano ka kasama — kayang gawin ng relihiyon?"
      :"The Republic of Maharlika, 1926. A chapel with a leaking roof, a Bible with promising ambiguities, and a century of opportunity."}</p>
    <p class="fine">${LANG==="tl"
      ?"IKAW ang lider ng kulto sa larong ito. Layunin: yumaman, lumakas, makipag-deal sa mga pulitiko. Matutunan mo kung paano gumagana ang manloloko — para hindi ka na nila maloloko."
      :"YOU play the cult leader. Grow the flock. Twist the Word. Rent the state. Learn how the machine works — from the inside."}</p>
    <p class="fine">${LANG==="tl"
      ?"PAANO LARUIN: Bawat sitwasyon, pumili ng isa sa dalawang sagot. Bantayan ang tatlong meter sa taas — kapag na-zero o napuno ang isa, tapos ang laro. Lahat ng pangyayari dito ay may katumbas na TOTOO. Makikita mo ang mga resibo sa dulo."
      :"HOW TO PLAY: each situation, pick one of two answers. Watch the three meters — if one hits zero or fills up, your reign ends. Every dark mechanic is documented. The receipts arrive at the end. They always do."}</p>
    <button onclick="startGame()">${LANG==="tl"?"Simulan":"Answer the Calling"}</button>
    <div><button class="ghost" id="tl2">${LANG==="tl"?"Play in English":"Maglaro sa Tagalog"}</button></div>
    <p class="fine" style="margin-top:18px;">v0.3 · Sagip Pilipinas family</p>
  </div>`;
  document.getElementById("tl2").onclick=()=>{LANG=LANG==="tl"?"en":"tl";title();};
}
window.startGame=function(){ buildQueue(); CUR=null; showCard(); };
title();
</script>
