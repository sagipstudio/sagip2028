 l:[{tl:"I-audit ang listahan (aminin na may duda)",en:"Audit the rolls (admit doubt exists)"},{v:-5,d:+2,f:"audited",rec:"rolls"}], r:[{tl:"Magtiwala sa org chart",en:"Trust the org chart"},{v:+2,b:-5,f:"blind",rec:"rolls"}]},

{tag:{tl:"ANG MGA TAHIMIK",en:"THE QUIET ONES"}, req:"audited",
 body:{tl:"Lumabas ang audit: libu-libo na ang naglaho — nasa listahan pa rin, matagal nang wala sa mga bangko. May inihanda nang listahan ng mga 'lapsed brethren.' Tanong ng security kung gaano ka-'masigasig' ang pag-uwi sa kanila.",
       en:"The audit is in: thousands have faded — still on the rolls, long gone from the pews. A list of 'lapsed brethren' is prepared. Security asks how vigorously to 'shepherd them home.'"},
 l:[{tl:"Hayaan silang umalis",en:"Let them go"},{b:-4,c:+3,rec:"leavers"}], r:[{tl:"Iuwi sila. Nang masigasig.",en:"Shepherd them home. Vigorously."},{v:+3,r:+3,f:"hunted",rec:"leavers"}]},

{tag:{tl:"DAYUHANG MEDIA",en:"FOREIGN PRESS"},
 body:{tl:"May dumating na documentary crew mula sa isang malamig at magalang na bansa. Kinukunan nila ang lahat. Mungkahi ng security ang standard package: ilaw sa lente nila, at kutsilyo sa gulong nila.",
       en:"A documentary crew has arrived from a cold, polite country. They film everything. Security proposes the standard package: spotlights into their lenses, and a knife for their tires."},
 l:[{tl:"Buksan ang lahat. Walang itago.",en:"Full access. Hide nothing."},{v:-4,d:+5,c:+2,rec:"cbc"}], r:[{tl:"Ang standard package",en:"The standard package"},{d:-7,r:+3,f:"slashed",rec:"cbc"}]},

{tag:{tl:"ANG BROADCAST",en:"BROADCAST"}, req:"slashed",
 body:{tl:"Umere ang dokumentaryo nila sa ibang bansa. Ang sinaksak na gulong ang opening shot. Mungkahi ng abogado mo: kasuhan sila sa sarili nilang korte — 'formality lang' daw.",
       en:"Their documentary airs abroad. The slashed tires are the opening shot. Your lawyer proposes suing them in their own courts, which he describes as 'a formality.'"},
 l:[{tl:"Hayaang kumupas",en:"Let it fade"},{v:-3}], r:[{tl:"Kasuhan sa abroad (formality lang)",en:"Sue abroad (a formality)"},{b:-8,r:+3,d:-3}]},

{tag:{tl:"PALABAS",en:"SPECTACLE"},
 body:{tl:"Mungkahi ng Ministry of Records: world record — ang pinakamalaking fireworks display sa kasaysayan ng tao. Walong daang libong paputok. Ang salitang 'kulto' ay lalabas sa ZERO na headline.",
       en:"The Ministry of Records proposes a world record: the largest fireworks display in human history. Eight hundred thousand fireworks. The word 'cult' will appear in zero headlines."},
 l:[{tl:"Walang mabubusog sa paputok",en:"Fireworks don't feed anyone"},{v:-2,c:+1}], r:[{tl:"Sindihan ang langit",en:"Light the sky"},{b:-9,v:+8,d:+5,rec:"record"}]},

{tag:{tl:"MGA PAGBILI",en:"ACQUISITIONS"},
 body:{tl:"May bakanteng bayan na ibinebenta sa isang dayuhang kapatagan. Apatnapung ektarya, isang saloon, zero na naninirahan. Hindi nagtanong ang broker kung bakit kailangan ng simbahan ng ghost town. Hindi mo rin sinabi.",
       en:"An empty town is for sale in a foreign prairie. Forty hectares, one saloon, zero inhabitants. The broker does not ask why a church needs a ghost town. You do not tell him."},
 l:[{tl:"Huwag na",en:"Pass"},{}], r:[{tl:"Bilhin ang ghost town",en:"Buy the ghost town"},{b:-7,d:+3,rec:"ghosttown"}]},

{tag:{tl:"ANG DIKTADOR",en:"THE STRONGMAN"},
 body:{tl:"May heneral na nagdeklara na siya ang lunas sa kasaysayan. Isinara ng mga sundalo niya ang radio station mo nang hatinggabi — tapos kinaumagahan, dumating ang sugo niya, iniaalok itong ibalik. May kasama pang kontrata. At lupa. Isa lang naman ang gusto niya, gaya ng lahat: LAHAT.",
       en:"A general has declared himself the cure for history. His soldiers shut your radio station at midnight — then at dawn his envoy arrives, offering it back. Plus contracts. Plus land. He only wants what everyone wants: everything."},
 l:[{tl:"Lumayo",en:"Keep your distance"},{b:-6,v:-2,c:+2,f:"distant"}], r:[{tl:"Basbasan ang lunas",en:"Bless the cure"},{b:+12,r:+4,f:"blessed",rec:"strongman"}]},

{tag:{tl:"ANG LISTAHAN",en:"THE LIST"}, req:"blessed",
 body:{tl:"Nilulutas na ngayon ng pulisya ng Diktador ang kahirapan sa pamamagitan ng pagbabawas. Hiling niya: ipangaral mong lahat ng namatay ay may kasalanan. Naka-draft na ang sermon. May binayaran kada pangalan dito.",
       en:"The Strongman's police now solve poverty by subtraction. He asks you to preach that the dead were all guilty. The sermon is already drafted. Someone was paid per name on it."},
 l:[{tl:"Tanggihan ang sermon",en:"Refuse the sermon"},{d:-5,b:-5,c:+4}], r:[{tl:"Ipangaral ito",en:"Preach it"},{v:+6,r:+6,f:"complicit",rec:"thelist"}]},

{tag:{tl:"ANG ORAS",en:"THE HOUR"}, req:"blessed",
 body:{tl:"Puno ng tao ang mga kalye. Real-time na bumabagsak ang mga estatwa ng Diktador. Ang endorsement mo sa kanya, naka-frame sa lobby ng palasyo niya. May iisang tamang oras para lumipat ng panig — at 'yon ay ngayon-ngayon na.",
       en:"Crowds fill the streets. The Strongman's statues are coming down in real time. Your endorsement of him is framed in his palace lobby. There is exactly one correct hour to switch sides, and it is now-ish."},
 l:[{tl:"Tapat hanggang dulo",en:"Loyalty to the end"},{v:-9,b:-8,r:+2}], r:[{tl:"Matuklasan, sa publiko, na lagi mo palang minahal ang demokrasya",en:"Discover, publicly, that you always loved democracy"},{v:+6,d:+4,rec:"strongman"}]},

{tag:{tl:"ANG PAGDINIG",en:"THE HEARING"},
 body:{tl:"May senadora — may-akda ng mga minamahal na batas, chair ng komiteng hindi mo kontrolado — na nag-subpoena ng mga libro mo. Mungkahi ng mga alyado mo ang mirror-charge: akusahan SIYA ng ginawa mo. Ang projection, ayon sa kasaysayan, ay mapagkakatiwalaan.",
       en:"A senator — author of beloved laws, chair of nothing you control — has subpoenaed your books. Your allies propose the mirror-charge: accuse HER of the thing you did. The projection is, historically, reliable."},
 l:[{tl:"Sumipot. Tumestigo. Mag-gaslight nang naka-panunumpa.",en:"Appear. Testify. Gaslight under oath."},{v:-3,d:-4,r:+1,rec:"hearing"}], r:[{tl:"I-file ang mirror-charge",en:"File the mirror-charge"},{d:-6,r:+4,f:"mirrored",rec:"mirror"}]},

{tag:{tl:"ANG TESTIGO",en:"THE WITNESS"}, req:"mirrored",
 body:{tl:"May dating pastoral na tetestigo sana. Sa halip, may video na lumabas: nagbabawi siya, palinga-linga ang mata sa may hawak ng cue cards — o ng pamilya niya. Nag-file ng cyberlibel ang senadora sa loob ng isang oras.",
       en:"A former pastoral was set to testify. A video surfaces instead: she recants, eyes darting off-camera to someone holding either cue cards or her family. The senator files cyberlibel within the hour."},
 l:[{tl:"Pakawalan siya. Bawiin ang video.",en:"Release her. Withdraw the video."},{v:-4,c:+4}], r:[{tl:"I-amplify ang pagbabawi",en:"Amplify the recantation"},{v:+4,r:+4,d:-4,rec:"hearing"}]},

{tag:{tl:"ANG AMING TAO SA SENADO",en:"OUR MAN IN THE SENATE"}, req:"comelec",
 body:{tl:"Si Brother Marcival — ang tao mo, ang linya mo sa balota, ang senador mo — ay kinasuhan ng plunder: ₱75 milyon na 'donasyon.' Non-bailable. Hinihintay ng mga kapatid ang headline na pipiliin mo.",
       en:"Brother Marcival — your man, your ballot line, your senator — has been charged with plunder over ₱75 million in 'donations.' Non-bailable. The faithful await the headline you choose."},
 l:[{tl:"Headline: PLUNDER (hayaan siyang bumagsak)",en:"Headline: PLUNDER (let him fall)"},{v:-8,d:+4,c:+2,rec:"senator"}], r:[{tl:"Headline: PERSECUTION (punuin ang kalsada)",en:"Headline: PERSECUTION (rally the avenue)"},{v:+6,d:-7,r:+3,f:"occupied2",rec:"senator"}]},

{tag:{tl:"ANG AMO",en:"THE PATRON"},
 body:{tl:"Hangang-hanga ang cultural attaché ng isang dayuhang embahada sa broadcasting arm mo. Alok niya: 'audience development' — sampung libong account na hindi natutulog at hindi sumasalungat. Libre. Na siya ngang, siyempre, presyo.",
       en:"A foreign embassy's cultural attaché admires your broadcasting arm. He offers 'audience development' — ten thousand accounts that never sleep and never disagree. Free. Which is, of course, the price."},
 l:[{tl:"Tanggihan ang koro",en:"Decline the choir"},{d:+2,c:+1}], r:[{tl:"Tanggapin ang ghost choir",en:"Accept the ghost choir"},{v:+7,r:+3,f:"patron",rec:"patron"}]},

{tag:{tl:"KARTOGRAPIYA",en:"CARTOGRAPHY"}, req:"patron",
 body:{tl:"Ang bagong mapa ng Amo sa dagat: may tumubo na namang dash. Nabigyan na ng opisyal na linya ang mga news anchor mo: matagal nang may sampung dash ang mapa. May libing ng mangingisda sa mismong oras ng fireworks mo.",
       en:"The Patron's new map of the sea has grown a dash. Your news anchors have been provided the official position: the map has always had ten dashes. A fisherman's funeral is scheduled opposite your fireworks."},
 l:[{tl:"Banggitin ang dash",en:"Mention the dash"},{d:-4,v:-2,c:+2,rec:"dash"}], r:[{tl:"Matagal nang may sampung dash ang mapa",en:"The map has always had ten dashes"},{v:+3,r:+2,rec:"dash"}]},

{tag:{tl:"ANG KUMPETISYON",en:"THE COMPETITION"},
 body:{tl:"Naaresto ang Hinirang na Anak ng Diyos (sariling titulo; karibal na franchise) dahil sa tinatawag ng indictment, nang mahaba, na LAHAT. Inanunsyo niya ang kandidatura niya sa Senado mula sa Cell Block D. Sabi ng mga tagasunod niya: persecution. Sabi ng mga abogado niya: 'novel.'",
       en:"The Appointed Son of God (self-styled; franchise rival) has been arrested for what the indictment calls, at length, everything. He announces his Senate run from Cell Block D. His followers call it persecution. His lawyers call it 'novel.'"},
 l:[{tl:"Ipagdasal siya sa publiko (pagkakaisa ng mga pastol)",en:"Publicly pray for him (solidarity of shepherds)"},{v:+2,r:+1,rec:"jailrun"}], r:[{tl:"Tahimik na sipsipin ang mga kongregasyon niya",en:"Quietly absorb his congregations"},{v:+6,b:+6,d:-2,rec:"jailrun"}]},

{tag:{tl:"ANG REPORMISTA",en:"THE REFORMER"},
 body:{tl:"Ang senadorang nag-iimbestiga sa'yo ay siya ring sumulat ng Mental Health Act. Mahal siya ng mga nanay. Paliwanag ng mga consultant mo, may slides pa: kailangan munang MALIMUTAN ng bayan ang batas bago nito makayang kamuhian ang may-akda. Budget: malaki-laki.",
       en:"The senator investigating you also wrote the Mental Health Act. The mothers love her. Your consultants explain, with slides: the country must first forget the law to hate its author. Budget: considerable."},
 l:[{tl:"May mga taong hindi kayang bilhin pababa",en:"Some people cannot be bought down"},{d:-2,c:+2,rec:"reformer"}], r:[{tl:"Pondohan ang paglimot",en:"Fund the forgetting"},{b:-8,d:+4,r:+4,rec:"reformer"}]},

{tag:{tl:"PAGHALILI",en:"SUCCESSION"},
 body:{tl:"Nakaupo na ngayon ang anak mo sa unahang bangko, kinakanta ang mga sermon mo kalahating segundong mas maaga. Ayon sa Sanggunian, ang paghalili ng dugo ay may 'matibay na batayan sa kasulatan' — na hindi totoo, na kailanman ay hindi naging mahalaga.",
       en:"Your son sits in the front pew now, mouthing your sermons a half-second early. The Sanggunian notes that hereditary succession has 'strong scriptural precedent,' which is not true, which has never mattered."},
 l:[{tl:"Dapat lumampas ang simbahan sa isang pamilya",en:"The church should outgrow one family"},{v:-4,c:+3,f:"open"}], r:[{tl:"Sanayin ang bata",en:"Groom the boy"},{v:+5,f:"dynasty"}]},

{tag:{tl:"ANG OPISYAL",en:"THE OFFICER"}, req:"occupied2",
 body:{tl:"May police general — miyembro, bininyagan sa edad na siyam, tapat sa loob ng apatnapung taon — na inutusang i-serve ang warrant kay Brother Marcival. Hinihingi niya ang basbas mo para gampanan ang tungkulin niya. Nasa pangatlong bangko ang nanay niya.",
       en:"A police general — a member, baptized at nine, faithful for forty years — has been ordered to serve the warrant on Brother Marcival. He asks for your blessing to do his duty. His mother is in the third pew."},
 l:[{tl:"Basbasan ang tungkulin niya",en:"Bless his duty"},{v:-6,d:+3,c:+4}], r:[{tl:"I-tiwalag siya. Pati ang nanay niya.",en:"Expel him (tiwalag). His mother too."},{v:+7,r:+5,f:"purgedcop",rec:"purge"}]}
];

const ENDINGS={
 schism:{tl:["MGA BAKANTENG BANGKO","Siningil na ang utang ng doktrina. Hindi sumabog ang simbahan — dahan-dahan lang itong umupo nang papaliit: ang Paglaho, kumpleto na. Apat na deacon ang nakinig sa huling sermon mo. Tatlo sa kanila, nagbibilang ng kubyertos."],
        en:["EMPTY PEWS","The doctrine debt was called in. The pews emptied not with a bang but with a shrug — the Fade, complete. Your last sermon was attended by four deacons, three of whom were counting the silverware."]},
 deified:{tl:["ANG HINIRANG","Umabot ang Pagkakaisa sa numerong walang natirang puwang sa duda. Sa gitna ng palakpakan, tumigil ka sa pagiging mensahero at naging mensahe. Ang pagiging diyos ay hindi labasan — isa itong kandadong pinto na sumasamba sa sarili."],
        en:["THE APPOINTED","Unity hit a number with no remainder for doubt. Somewhere in the applause you stopped being the messenger and became the message. Self-deification is not an exit; it is a locked door that worships itself."]},
 broke:{tl:["KABANATA 11:1–4","Natuyo ang Biyaya. Ang mga jet: leased pala. Ang arena: naka-sangla. Ang ghost town — hindi maibenta, siyempre. Darating ang mga receiver sa Lunes. Napaka-magalang nila. May spreadsheet sila. Nakakainis: tama ito."],
        en:["CHAPTER 11:1–4","Blessings ran dry. The jets were leased, the arena mortgaged, the ghost town — unsellable, obviously. The receivers arrive Monday. They are very polite. They have a spreadsheet. It is, annoyingly, accurate."]},
 forbes:{tl:["ANG RICH LIST","Nakapasok ka sa listahang hindi mo ma-ikapu palabas. Tinawag itong yaman ng Forbes; tinawag itong Exhibit A ng BIR. Ang sobrang liwanag ay isa ring pagkakalantad."],
        en:["THE RICH LIST","You made a list you cannot tithe your way off. Forbes called it a fortune; the tax bureau called it Exhibit A. Too much light is also an exposure."]},
 indicted:{tl:["ANG PROSECUTOR","Umabot sa zero ang Palusot — wala nang natirang maipalusot. Tatlumpung taong lumaki ang file ng batang prosecutor. Ang mga file, hindi tulad ng mga testigo, ay hindi nagbabawi."],
        en:["THE PROSECUTOR","Plausible deniability reached zero — there was nothing left to plausibly deny. The young prosecutor's file had grown for thirty years. Files, unlike witnesses, do not recant."]},
 hague:{tl:["ANG PANINGIL","Dumating ito sa paraang lagi nitong pagdating: dahan-dahan, tapos sa isang umaga lang. Ang eroplano. Ang warrant. Ang korteng mali pa ang baybay ng pangalan mo. Ang transcript na sinabi nilang walang kwenta noong Ikalabindalawang Taon — binasa nang buo. Hindi ito tumanda."],
        en:["THE RECKONING","It arrived the way it always does: slowly, then in a single morning. The plane. The warrant. The dock with your name misspelled. The transcript they said was worthless in Year 12 was read aloud in full. It had not aged."]},
 dynasty:{tl:["ANG DINASTIYA","Namatay ka sa kama, minamahal, hindi nakasuhan, ipinagluksa ng milyun-milyon sa mga channel na pag-aari mo. Ipinatong ng anak mo ang kamay niya sa parehong pinilipit na talata. Walang napalampas na kahit isang kolekta ang makina. Ito ang endings kung saan nananalo ang makina. Kadalasan, nananalo ito."],
        en:["THE DYNASTY","You died in bed, beloved, unindicted, mourned by millions on channels you own. Your son placed his hand on the same twisted verse. The machine did not miss a single collection. This is the ending where the machine wins. It usually does."]},
 dismantle:{tl:["ANG PAGBUWAG","Ginastos mo ang lahat — bawat pabor, bawat sikreto, bawat deacon — para sunugin ang makina mula sa loob. Ang simbahang natira: maliit, mahirap, at tapat. Labing-isang bangko. Isang butas sa bubong. Sapat na. Noon pa man, sapat na."],
        en:["THE DISMANTLING","You spent it all — every favor, every secret, every deacon — burning the machine from the inside. The church that remains is small, poor, and honest. Eleven pews. One leak in the roof. It is enough. It was always enough."]}
};

const UI={
 year:{tl:"Taon ng Ating Panginoon",en:"Year of Our Lord"},
 souls:{tl:"kaluluwa sa listahan*",en:"souls on the rolls*"},
 foot:{tl:"*bilang galing sa mga deacon, kaya naman totoo",en:"*figure supplied by deacons and therefore true"},
 rec:{tl:"ANG MGA RESIBO — akala mo imbento lang namin",en:"The Receipts — you thought we made this up"},
 norec:{tl:"Natapos ka nang walang resibo. Kahanga-hanga. Halos kahina-hinala.",en:"You finished with no receipts. Remarkable. Almost suspicious."},
 reign:{tl:"Paghahari",en:"Reign"}, yrs:{tl:"taon",en:"years"},
 rtok:{tl:"Reckoning tokens",en:"Reckoning tokens"}, cons:{tl:"Konsensya",en:"Conscience"},
 again:{tl:"Magtayo ng Panibagong Simbahan",en:"Found Another Church"},
 mV:{tl:"✝ Vibes",en:"✝ Vibes"}, mB:{tl:"₱ Biyaya",en:"₱ Blessings"}, mD:{tl:"🕶 Palusot",en:"🕶 Deniability"}
};

let queue=[], app=document.getElementById("app");
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQueue(){
  queue=shuffle(DECK.slice());
  queue.sort((a,b)=>((T(a.tag)==="ANG TAWAG"||T(a.tag)==="THE CALLING")?-1:0)-((T(b.tag)==="ANG TAWAG"||T(b.tag)==="THE CALLING")?-1:0));
}
function nextCard(){
  for(let i=0;i<queue.length;i++){ const c=queue[i];
    if(!c.req||S.flags[c.req]){ queue.splice(i,1); return c; } }
  return null;
}
function meterBar(label,val,warn){
  return `<div class="meter"><div class="label">${label}</div>
    <div class="bar ${warn?"warn":""}"><i style="width:${val}%"></i></div></div>`;
}
function renderHUD(){
  return `<header><h1>CHURCH INCORPORATED</h1>
  <div class="sub">${LANG==="tl"?"Kaligtasan, Ibinebenta nang Hiwalay":"Salvation Sold Separately"}</div>
  <button id="langbtn">${LANG==="tl"?"EN":"TL"}</button></header>
  <div id="meters">
    ${meterBar(T(UI.mV),S.v,S.v<20||S.v>85)}
    ${meterBar(T(UI.mB),S.b,S.b<20||S.b>85)}
    ${meterBar(T(UI.mD),S.d,S.d<25)}
  </div>
  <div id="status"><span>${T(UI.year)} ${S.year}</span><span>${S.followers.toLocaleString()} ${T(UI.souls)}</span></div>`;
}
function bindLang(f){ const b=document.getElementById("langbtn"); if(b)b.onclick=()=>{LANG=LANG==="tl"?"en":"tl";f();}; }
function apply(e){
  if(!e)return;
  if(e.v)S.v=clamp(S.v+e.v); if(e.b)S.b=clamp(S.b+e.b); if(e.d)S.d=clamp(S.d+e.d);
  if(e.c)S.conscience+=e.c; if(e.r)S.reckon+=e.r;
  if(e.f)S.flags[e.f]=true; if(e.rec)S.receipts.add(e.rec);
}
function tick(){
  S.year+=2+Math.floor(Math.random()*2);
  const g=Math.round(S.followers*(0.06+S.v/400));
  S.followers+=(S.flags.blind?Math.max(g,120):g)-(S.flags.hunted?Math.floor(S.followers*0.01):0);
}
function checkEnd(){
  if(S.v<=0)return"schism"; if(S.v>=100)return"deified";
  if(S.b<=0)return"broke"; if(S.b>=100)return"forbes";
  if(S.d<=0)return S.reckon>=14?"hague":"indicted";
  return null;
}
let CUR=null;
function showCard(){
  if(!CUR) CUR=nextCard();
  const c=CUR;
  if(!c){ endGame(S.conscience>=12?"dismantle":(S.reckon>=16?"hague":"dynasty")); return; }
  app.innerHTML=renderHUD()+`
   <div id="cardZone"><div class="card">
     <div class="tag">${T(c.tag)}</div>
     ${c.verse?`<p class="verse">${T(c.verse)}</p>`:""}
     <p class="body">${T(c.body)}</p>
   </div></div>
   <div id="choices">
     <button id="L">${T(c.l[0])}</button>
     <button id="R">${T(c.r[0])}</button>
   </div>
   <footer>${T(UI.foot)}</footer>`;
  bindLang(showCard);
  document.getElementById("L").onclick=()=>{apply(c.l[1]);CUR=null;after();};
  document.getElementById("R").onclick=()=>{apply(c.r[1]);CUR=null;after();};
}
function after(){ tick(); const e=checkEnd(); if(e){endGame(e);}else{showCard();} }
function receiptsHTML(){
  if(S.receipts.size===0)return`<p class='fine'>${T(UI.norec)}</p>`;
  let li=""; S.receipts.forEach(k=>{const c=CODEX[k][LANG]; if(c)li+=`<li><b>${c[0]}.</b> <span style="color:var(--muted);font-style:italic;">${c[1]}</span></li>`;});
  return`<div id="receipts"><h3>${T(UI.rec)}</h3><ul>${li}</ul></div>`;
}
let ENDKEY=null;
function endGame(key){
  if(key)ENDKEY=key;
  const e=ENDINGS[ENDKEY][LANG];
  S.over=true;
  app.innerHTML=renderHUD()+`<div class="screen">
    <h2>${e[0]}</h2>
    <p>${e[1]}</p>
    <p class="fine">${T(UI.reign)}: ${S.year-1926} ${T(UI.yrs)} · ${S.followers.toLocaleString()} ${T(UI.souls).replace("*","")} · ${T(UI.rtok)}: ${S.reckon} · ${T(UI.cons)}: ${S.conscience}</p>
    ${receiptsHTML()}
    <button onclick="location.reload()">${T(UI.again)}</button>
  </div>`;
  bindLang(()=>endGame());
}
function title(){
  app.innerHTML=`<div class="screen">
    <h2 style="font-size:2.1rem;letter-spacing:.18em;">CHURCH<br>INCORPORATED</h2>
    <p class="fine" style="letter-spacing:.26em;text-transform:uppercase;">${LANG==="tl"?"Kaligtasan, Ibinebenta nang Hiwalay":"Salvation Sold Separately"}</p>
    <p style="margin-top:22px;">${LANG==="tl"
      ?"Ang Republika ng Maharlika, 1926. Isang kapilyang may butas ang bubong, isang Bibliyang puno ng mga 'pwedeng pag-usapan,' at isang siglo ng oportunidad."
      :"The Republic of Maharlika, 1926. A chapel with a leaking roof, a Bible with promising ambiguities, and a century of opportunity."}</p>
    <p class="fine">${LANG==="tl"
      ?"Palaguin ang kawan. Pilipitin ang Salita. Upahan ang gobyerno. Bantayan ang tatlong metro mo — at ang dalawang hindi mo nakikita."
      :"Grow the flock. Twist the Word. Rent the state. Mind your three meters — and the two you cannot see."}</p>
    <p class="fine">${LANG==="tl"
      ?"Bawat madilim na mekanika sa larong ito ay dokumentado. Darating ang mga resibo sa dulo. Lagi silang dumarating."
      :"Every dark mechanic in this game is documented. The receipts arrive at the end. They always do."}</p>
    <button onclick="startGame()">${LANG==="tl"?"Sagutin ang Tawag":"Answer the Calling"}</button>
